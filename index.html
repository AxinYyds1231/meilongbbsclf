<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>梅陇中学论坛</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        /* 首页专用样式 - 分类树 */
        .category-tree .tree-node { padding: 0 8px; }
        .tree-node .node-label {
            display: flex;
            align-items: center;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s;
            color: #1a2332;
            font-size: 0.9rem;
            gap: 4px;
        }
        .tree-node .node-label:hover { background: rgba(26,60,110,0.06); }
        .tree-node .node-label.active {
            background: rgba(26,60,110,0.12);
            color: #1a3c6e;
            font-weight: 500;
        }
        .tree-node .node-label .icon { width: 20px; text-align: center; }
        .tree-node .node-label .toggle {
            margin-left: auto;
            font-size: 0.7rem;
            color: #8b9aab;
            transition: transform 0.2s;
        }
        .tree-node .node-label .toggle.open { transform: rotate(90deg); }
        .tree-node .children {
            padding-left: 20px;
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.25s ease;
        }
        .tree-node .children.open { max-height: 2000px; }
        /* 帖子列表 */
        .post-item {
            background: rgba(255,255,255,0.4);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.6);
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .post-item:hover {
            background: rgba(255,255,255,0.7);
            transform: translateY(-1px);
        }
        .post-title { font-size: 1rem; font-weight: 600; color: #1a2332; }
        .post-meta {
            font-size: 0.8rem;
            color: #6b7a8a;
            margin-top: 4px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .post-meta a { color: #1a3c6e; }
        .empty { text-align: center; color: #8b9aab; padding: 40px 0; }
        .announcement-bar {
            background: rgba(255,215,0,0.1);
            padding: 6px 12px;
            border-radius: 10px;
            margin-bottom: 12px;
            border-left: 4px solid #ffc107;
        }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <!-- 左侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>📚 梅陇论坛</h2>
            </div>
            <!-- 导航链接 -->
            <nav class="sidebar-nav">
                <a href="/index.html" class="active">🏠 首页</a>
                <a href="/dashboard.html">👤 个人中心</a>
                <a href="/inbox.html">📩 私信 <span id="navBadge" class="badge" style="display:none;">0</span></a>
                <a href="/adminLogin.html">🔑 管理</a>
            </nav>
            <!-- 分类树 -->
            <div class="sidebar-header" style="border-top:1px solid rgba(0,0,0,0.04); padding-top:12px; margin-top:8px;">
                <h2>📂 分类</h2>
            </div>
            <div id="categoryTree" class="category-tree" style="flex:1; overflow-y:auto;"></div>
        </aside>

        <!-- 右侧主内容 -->
        <main class="main-content">
            <div class="page-title">
                <span id="pageTitle">📚 全部帖子</span>
                <span style="flex:1;"></span>
                <span id="userInfo" style="font-size:0.9rem; color:#4a5a6a; margin-right:8px;"></span>
                <button id="createBtn" class="btn-primary" style="display:none;">➕ 发帖</button>
                <button id="logoutBtn" class="btn-secondary" style="display:none;">退出</button>
            </div>
            <div id="announcementBar"></div>
            <div id="postList" class="post-list" style="flex:1; overflow-y:auto;">加载中...</div>
        </main>
    </div>

    <script>
        // ---- 状态 ----
        let currentCategoryId = 0;
        let categoriesTree = [];

        // ---- DOM引用 ----
        const treeContainer = document.getElementById('categoryTree');
        const postListEl = document.getElementById('postList');
        const pageTitle = document.getElementById('pageTitle');

        // ---- 辅助 ----
        function formatTime(ts) { return new Date(ts).toLocaleString('zh-CN'); }

        // ---- 加载分类树 ----
        async function loadCategories() {
            try {
                const res = await fetch('/api/categories');
                const data = await res.json();
                categoriesTree = data.categories || [];
                renderTree(categoriesTree);
            } catch (err) {
                treeContainer.innerHTML = '<div style="color:red;padding:12px;">加载分类失败</div>';
            }
        }

        function renderTree(nodes, level = 0) {
            if (!nodes || nodes.length === 0) {
                treeContainer.innerHTML = '<div style="color:#999;padding:12px;font-size:0.9rem;">暂无分类</div>';
                return;
            }
            let html = '';
            // 全部
            html += `
                <div class="tree-node">
                    <div class="node-label ${currentCategoryId === 0 ? 'active' : ''}" data-id="0">
                        <span class="icon">📋</span>
                        <span>全部</span>
                    </div>
                </div>
            `;
            function buildNodes(nodes, level) {
                let html = '';
                nodes.forEach(node => {
                    const hasChildren = node.children && node.children.length > 0;
                    const isActive = currentCategoryId === node.id;
                    const indent = level * 12;
                    html += `
                        <div class="tree-node">
                            <div class="node-label ${isActive ? 'active' : ''}" data-id="${node.id}" style="padding-left: ${12 + indent}px;">
                                <span class="icon">📁</span>
                                <span>${node.name}</span>
                                ${hasChildren ? `<span class="toggle open">▶</span>` : ''}
                            </div>
                            ${hasChildren ? `<div class="children open">${buildNodes(node.children, level + 1)}</div>` : ''}
                        </div>
                    `;
                });
                return html;
            }
            html += buildNodes(nodes, 0);
            treeContainer.innerHTML = html;

            // 绑定事件
            treeContainer.querySelectorAll('.node-label').forEach(el => {
                el.addEventListener('click', function(e) {
                    if (e.target.classList.contains('toggle')) {
                        const parent = this.closest('.tree-node');
                        const children = parent.querySelector('.children');
                        if (children) {
                            children.classList.toggle('open');
                            this.querySelector('.toggle').classList.toggle('open');
                        }
                        return;
                    }
                    const id = parseInt(this.dataset.id);
                    setActiveCategory(id);
                    treeContainer.querySelectorAll('.node-label').forEach(l => l.classList.remove('active'));
                    this.classList.add('active');
                });
            });
        }

        function setActiveCategory(catId) {
            currentCategoryId = catId;
            const cat = findCategoryById(categoriesTree, catId);
            pageTitle.textContent = cat ? `📚 ${cat.name}` : '📚 全部帖子';
            loadPosts(catId);
        }

        function findCategoryById(nodes, id) {
            for (let node of nodes) {
                if (node.id === id) return node;
                if (node.children) {
                    const found = findCategoryById(node.children, id);
                    if (found) return found;
                }
            }
            return null;
        }

        // ---- 加载帖子 ----
        async function loadPosts(categoryId = 0) {
            try {
                const url = categoryId ? `/api/posts?category=${categoryId}` : '/api/posts';
                const res = await fetch(url);
                const data = await res.json();
                renderPosts(data.posts || []);
            } catch (err) {
                postListEl.innerHTML = '<div style="color:red;padding:20px;">加载失败</div>';
            }
        }

        function renderPosts(posts) {
            if (!posts || posts.length === 0) {
                postListEl.innerHTML = '<div class="empty">📭 暂无帖子</div>';
                return;
            }
            let html = '';
            posts.forEach(p => {
                html += `
                    <div class="post-item" onclick="location.href='/post.html?id=${p.id}'">
                        <div class="post-title">${p.title}</div>
                        <div class="post-meta">
                            <span>📂 ${p.categoryName || '未分类'}</span>
                            <span>✍️ <a href="/profile.html?uid=${p.authorUid}" onclick="event.stopPropagation();">${p.authorName}</a></span>
                            <span>🕒 ${formatTime(p.createdAt)}</span>
                            <span>💬 ${p.replyCount}</span>
                            <span>👍 ${p.likesCount}</span>
                            <span>👎 ${p.dislikesCount}</span>
                        </div>
                    </div>
                `;
            });
            postListEl.innerHTML = html;
        }

        // ---- 公告 ----
        async function loadAnnouncements() {
            try {
                const res = await fetch('/api/announcement');
                const data = await res.json();
                const bar = document.getElementById('announcementBar');
                if (data.announcements && data.announcements.length > 0) {
                    let html = '<div class="announcement-bar">';
                    data.announcements.forEach(a => {
                        html += `<div><strong>📢 ${a.title}</strong>: ${a.content}</div>`;
                    });
                    html += '</div>';
                    bar.innerHTML = html;
                } else { bar.innerHTML = ''; }
            } catch (e) {}
        }

        // ---- 用户状态 ----
        async function checkLogin() {
            try {
                const res = await fetch('/api/user', { credentials: 'include' });
                if (res.status === 200) {
                    const data = await res.json();
                    document.getElementById('userInfo').textContent = '👋 ' + data.user.name;
                    document.getElementById('createBtn').style.display = 'inline-block';
                    document.getElementById('logoutBtn').style.display = 'inline-block';
                }
            } catch (e) {}
        }

        // ---- 未读消息数 ----
        async function updateBadge() {
            try {
                const res = await fetch('/api/inbox', { credentials: 'include' });
                if (res.status === 200) {
                    const data = await res.json();
                    const unread = data.messages ? data.messages.filter(m => !m.read).length : 0;
                    const badge = document.getElementById('navBadge');
                    if (unread > 0) {
                        badge.textContent = unread;
                        badge.style.display = 'inline-block';
                    } else {
                        badge.style.display = 'none';
                    }
                }
            } catch (e) {}
        }

        // ---- 退出 ----
        document.getElementById('logoutBtn')?.addEventListener('click', async function() {
            await fetch('/api/logout', { credentials: 'include' });
            window.location.href = '/login.html';
        });
        document.getElementById('createBtn')?.addEventListener('click', function() {
            window.location.href = '/createPost.html';
        });

        // ---- 启动 ----
        checkLogin();
        updateBadge();
        loadAnnouncements();
        loadCategories();
        loadPosts(0);
    </script>
</body>
</html>
