<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>梅陇中学论坛</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container" style="max-width: 720px;">
        <!-- 顶部导航 -->
        <div class="header">
            <h1>📚 梅陇中学论坛</h1>
            <div class="header-actions">
                <button id="createBtn" class="btn-primary" style="display:none;">➕ 发帖</button>
                <span id="userInfo"></span>
                <button id="logoutBtn" class="btn-secondary" style="display:none;">退出</button>
            </div>
        </div>
        <div class="nav-links">
            <a href="/index.html">🏠 首页</a>
            <a href="/dashboard.html">👤 个人中心</a>
            <a href="/inbox.html">📩 私信</a>
            <a href="/adminLogin.html">🔑 管理</a>
        </div>

        <!-- 分类导航 -->
        <div id="categoryNav" class="category-nav"></div>

        <!-- 帖子列表 -->
        <div id="postList" class="post-list">加载中...</div>
    </div>

    <script>
        // 检查登录
        async function checkLogin() {
            try {
                const res = await fetch('/api/user', { credentials: 'include' });
                if (res.status === 200) {
                    const data = await res.json();
                    document.getElementById('userInfo').innerHTML = '👋 ' + data.user.name;
                    document.getElementById('createBtn').style.display = 'inline-block';
                    document.getElementById('logoutBtn').style.display = 'inline-block';
                }
            } catch (e) {}
        }

        // 加载分类导航
        async function loadCategoriesNav() {
            try {
                const res = await fetch('/api/categories');
                const data = await res.json();
                const nav = document.getElementById('categoryNav');
                let html = '<button class="category-btn active" data-category="0">全部</button>';
                data.categories.forEach(cat => {
                    html += `<button class="category-btn" data-category="${cat.id}">${cat.name}</button>`;
                });
                nav.innerHTML = html;
                nav.querySelectorAll('.category-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        nav.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                        this.classList.add('active');
                        loadPosts(parseInt(this.dataset.category));
                    });
                });
            } catch (err) { console.error(err); }
        }

        // 加载帖子
        async function loadPosts(categoryId = 0) {
            try {
                const url = categoryId ? `/api/posts?category=${categoryId}` : '/api/posts';
                const res = await fetch(url);
                const data = await res.json();
                const container = document.getElementById('postList');
                if (!data.posts || data.posts.length === 0) {
                    container.innerHTML = '<div class="empty">📭 暂无帖子</div>';
                    return;
                }
                let html = '';
                data.posts.forEach(p => {
                    const time = new Date(p.createdAt).toLocaleString('zh-CN');
                    html += `
                        <div class="post-item" onclick="location.href='/post.html?id=${p.id}'">
                            <div class="post-title">${p.title}</div>
                            <div class="post-meta">
                                <span>📂 ${p.categoryName || '未分类'}</span>
                                <span>✍️ <a href="/profile.html?uid=${p.authorUid}" onclick="event.stopPropagation();">${p.authorName}</a></span>
                                <span>🕒 ${time}</span>
                                <span>💬 ${p.replyCount}</span>
                                <span>👍 ${p.likesCount}</span>
                                <span>👎 ${p.dislikesCount}</span>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            } catch (err) {
                document.getElementById('postList').innerHTML = '<div style="color:red;">加载失败</div>';
            }
        }

        document.getElementById('logoutBtn')?.addEventListener('click', async function() {
            await fetch('/api/logout', { credentials: 'include' });
            window.location.href = '/login.html';
        });
        document.getElementById('createBtn')?.addEventListener('click', function() {
            window.location.href = '/createPost.html';
        });

        checkLogin();
        loadCategoriesNav();
        loadPosts();
    </script>
</body>
</html>
