<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>梅陇中学论坛</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        /* ---- 全局重置（仅针对本页微调） ---- */
        body {
            padding: 0;
            margin: 0;
            background: #f0f2f5;
            display: flex;
            min-height: 100vh;
        }
        .app-wrapper {
            display: flex;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
            border: 1px solid rgba(255,255,255,0.5);
            overflow: hidden;
            height: 100vh;
            max-height: calc(100vh - 20px);
            margin-top: 10px;
            margin-bottom: 10px;
        }
        /* ---- 左侧边栏 ---- */
        .sidebar {
            width: 260px;
            min-width: 260px;
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(4px);
            border-right: 1px solid rgba(0,0,0,0.04);
            padding: 16px 0;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            height: 100%;
        }
        .sidebar-header {
            padding: 0 16px 12px 16px;
            border-bottom: 1px solid rgba(0,0,0,0.04);
            flex-shrink: 0;
        }
        .sidebar-header h2 {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 600;
            color: #1a2332;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .sidebar-header .sub {
            font-size: 0.75rem;
            font-weight: 400;
            color: #8b9aab;
        }
        .category-tree {
            padding: 8px 0;
            flex: 1;
            overflow-y: auto;
        }
        .category-tree .tree-node {
            padding: 0 8px;
        }
        .tree-node .node-label {
            display: flex;
            align-items: center;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s;
            color: #1a2332;
            font-size: 0.9rem;
            gap: 4px;
        }
        .tree-node .node-label:hover {
            background: rgba(26,60,110,0.06);
        }
        .tree-node .node-label.active {
            background: rgba(26,60,110,0.12);
            color: #1a3c6e;
            font-weight: 500;
        }
        .tree-node .node-label .icon {
            width: 18px;
            text-align: center;
            flex-shrink: 0;
        }
        .tree-node .node-label .toggle {
            margin-left: auto;
            font-size: 0.7rem;
            color: #8b9aab;
            transition: transform 0.2s;
        }
        .tree-node .node-label .toggle.open {
            transform: rotate(90deg);
        }
        .tree-node .children {
            padding-left: 20px;
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.2s ease;
        }
        .tree-node .children.open {
            max-height: 2000px;
        }
        .tree-node .children .node-label {
            padding-left: 8px;
        }
        /* ---- 右侧主内容 ---- */
        .main-content {
            flex: 1;
            padding: 20px 24px;
            overflow-y: auto;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 16px;
            flex-shrink: 0;
        }
        .main-header h1 {
            margin: 0;
            font-size: 1.4rem;
            font-weight: 600;
            color: #1a2332;
        }
        .main-header .actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .main-header .actions .user-info {
            font-size: 0.9rem;
            color: #4a5a6a;
            margin-right: 6px;
        }
        /* 帖子列表 */
        .post-list {
            flex: 1;
            overflow-y: auto;
            padding-right: 4px;
        }
        .post-item {
            background: rgba(255,255,255,0.4);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.6);
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .post-item:hover {
            background: rgba(255,255,255,0.7);
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .post-title {
            font-size: 1rem;
            font-weight: 600;
            color: #1a2332;
        }
        .post-meta {
            font-size: 0.8rem;
            color: #6b7a8a;
            margin-top: 4px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .post-meta a {
            color: #1a3c6e;
        }
        .empty {
            text-align: center;
            color: #8b9aab;
            padding: 40px 0;
        }
        /* ---- 移动端适配 ---- */
        @media (max-width: 768px) {
            .app-wrapper {
                flex-direction: column;
                height: auto;
                max-height: none;
                border-radius: 16px;
                margin: 8px;
            }
            .sidebar {
                width: 100%;
                min-width: unset;
                border-right: none;
                border-bottom: 1px solid rgba(0,0,0,0.04);
                max-height: 200px;
                overflow-y: auto;
                padding: 12px 0;
            }
            .sidebar-header h2 {
                font-size: 1rem;
            }
            .main-content {
                padding: 12px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <!-- 左侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>📂 分类 <span class="sub">(点击展开)</span></h2>
            </div>
            <div id="categoryTree" class="category-tree">
                <!-- 由 JavaScript 动态生成 -->
            </div>
        </aside>

        <!-- 右侧主内容 -->
        <main class="main-content">
            <div class="main-header">
                <h1 id="pageTitle">📚 全部帖子</h1>
                <div class="actions">
                    <span id="userInfo" class="user-info"></span>
                    <button id="createBtn" class="btn-primary" style="display:none;">➕ 发帖</button>
                    <button id="logoutBtn" class="btn-secondary" style="display:none;">退出</button>
                </div>
            </div>
            <div id="postList" class="post-list">加载中...</div>
        </main>
    </div>

    <script>
        // ---------- 数据状态 ----------
        let currentCategoryId = 0;
        let categoriesTree = [];
        let allPosts = [];

        // ---------- DOM引用 ----------
        const treeContainer = document.getElementById('categoryTree');
        const postListEl = document.getElementById('postList');
        const pageTitle = document.getElementById('pageTitle');

        // ---------- 辅助函数 ----------
        function formatTime(ts) {
            return new Date(ts).toLocaleString('zh-CN');
        }

        // ---------- 加载分类树 ----------
        async function loadCategories() {
            try {
                const res = await fetch('/api/categories');
                const data = await res.json();
                categoriesTree = data.categories || [];
                renderTree(categoriesTree);
            } catch (err) {
                treeContainer.innerHTML = '<div style="color:red; padding:12px;">加载分类失败</div>';
            }
        }

        // ---------- 渲染树 ----------
        function renderTree(nodes, level = 0) {
            if (!nodes || nodes.length === 0) {
                treeContainer.innerHTML = '<div style="color:#999; padding:12px; font-size:0.9rem;">暂无分类</div>';
                return;
            }
            let html = '';
            // 添加"全部"节点（特殊）
            html += `
                <div class="tree-node">
                    <div class="node-label ${currentCategoryId === 0 ? 'active' : ''}" data-id="0">
                        <span class="icon">📋</span>
                        <span>全部</span>
                    </div>
                </div>
            `;
            // 递归生成树节点
            function buildNodes(nodes, level) {
                let html = '';
                nodes.forEach(node => {
                    const hasChildren = node.children && node.children.length > 0;
                    const isActive = currentCategoryId === node.id;
                    const indent = level * 12;
                    html += `
                        <div class="tree-node">
                            <div class="node-label ${isActive ? 'active' : ''}" data-id="${node.id}" style="padding-left: ${12 + indent}px;">
                                <span class="icon">📁</span>
                                <span>${node.name}</span>
                                ${hasChildren ? `<span class="toggle open">▶</span>` : ''}
                            </div>
                            ${hasChildren ? `<div class="children open">${buildNodes(node.children, level + 1)}</div>` : ''}
                        </div>
                    `;
                });
                return html;
            }
            html += buildNodes(nodes, 0);
            treeContainer.innerHTML = html;

            // 绑定点击事件
            treeContainer.querySelectorAll('.node-label').forEach(el => {
                el.addEventListener('click', function(e) {
                    // 如果点击了折叠箭头，不切换分类
                    if (e.target.classList.contains('toggle')) {
                        const parent = this.closest('.tree-node');
                        const children = parent.querySelector('.children');
                        if (children) {
                            children.classList.toggle('open');
                            this.querySelector('.toggle').classList.toggle('open');
                        }
                        return;
                    }
                    const id = parseInt(this.dataset.id);
                    setActiveCategory(id);
                    // 高亮
                    treeContainer.querySelectorAll('.node-label').forEach(l => l.classList.remove('active'));
                    this.classList.add('active');
                });
            });

            // 默认展开所有（或根据需求）
        }

        // ---------- 切换分类 ----------
        function setActiveCategory(catId) {
            currentCategoryId = catId;
            const cat = findCategoryById(categoriesTree, catId);
            const name = cat ? cat.name : '全部';
            pageTitle.textContent = `📚 ${name}`;
            loadPosts(catId);
        }

        // ---------- 递归查找分类 ----------
        function findCategoryById(nodes, id) {
            for (let node of nodes) {
                if (node.id === id) return node;
                if (node.children) {
                    const found = findCategoryById(node.children, id);
                    if (found) return found;
                }
            }
            return null;
        }

        // ---------- 加载帖子 ----------
        async function loadPosts(categoryId = 0) {
            try {
                const url = categoryId ? `/api/posts?category=${categoryId}` : '/api/posts';
                const res = await fetch(url);
                const data = await res.json();
                allPosts = data.posts || [];
                renderPosts(allPosts);
            } catch (err) {
                postListEl.innerHTML = '<div style="color:red; padding:20px;">加载帖子失败</div>';
            }
        }

        // ---------- 渲染帖子列表 ----------
        function renderPosts(posts) {
            if (!posts || posts.length === 0) {
                postListEl.innerHTML = '<div class="empty">📭 暂无帖子</div>';
                return;
            }
            let html = '';
            posts.forEach(p => {
                html += `
                    <div class="post-item" onclick="location.href='/post.html?id=${p.id}'">
                        <div class="post-title">${p.title}</div>
                        <div class="post-meta">
                            <span>📂 ${p.categoryName || '未分类'}</span>
                            <span>✍️ <a href="/profile.html?uid=${p.authorUid}" onclick="event.stopPropagation();">${p.authorName}</a></span>
                            <span>🕒 ${formatTime(p.createdAt)}</span>
                            <span>💬 ${p.replyCount}</span>
                            <span>👍 ${p.likesCount}</span>
                            <span>👎 ${p.dislikesCount}</span>
                        </div>
                    </div>
                `;
            });
            postListEl.innerHTML = html;
        }

        // ---------- 用户登录状态 ----------
        async function checkLogin() {
            try {
                const res = await fetch('/api/user', { credentials: 'include' });
                if (res.status === 200) {
                    const data = await res.json();
                    document.getElementById('userInfo').textContent = '👋 ' + data.user.name;
                    document.getElementById('createBtn').style.display = 'inline-block';
                    document.getElementById('logoutBtn').style.display = 'inline-block';
                }
            } catch (e) {}
        }

        // ---------- 退出 ----------
        document.getElementById('logoutBtn')?.addEventListener('click', async function() {
            await fetch('/api/logout', { credentials: 'include' });
            window.location.href = '/login.html';
        });
        document.getElementById('createBtn')?.addEventListener('click', function() {
            window.location.href = '/createPost.html';
        });

        // ---------- 启动 ----------
        checkLogin();
        loadCategories();
        loadPosts(0);
    </script>
</body>
</html>
