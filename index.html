<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>梅陇中学论坛</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .post-item {
            background: rgba(255,255,255,0.5);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.7);
            padding: 14px 18px;
            border-radius: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .post-item:hover {
            background: rgba(255,255,255,0.8);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0,0,0,0.06);
        }
        .post-title {
            font-size: 1.05rem;
            font-weight: 600;
            color: #1a2332;
        }
        .post-meta {
            font-size: 0.85rem;
            color: #5a6a7a;
            margin-top: 6px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .post-meta a {
            color: #1a3c6e;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 1.7rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1a3c6e, #2a5a8e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .btn-primary {
            background: #1a3c6e;
            color: #fff;
            border: none;
            padding: 8px 22px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(26,60,110,0.2);
        }
        .btn-primary:hover {
            background: #2a5a8e;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(26,60,110,0.3);
        }
        .btn-secondary {
            background: rgba(0,0,0,0.06);
            color: #1a2332;
            border: 1px solid rgba(0,0,0,0.08);
            padding: 8px 22px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
        }
        .btn-secondary:hover {
            background: rgba(0,0,0,0.1);
        }
        .nav-links {
            display: flex;
            gap: 18px;
            flex-wrap: wrap;
            padding: 12px 0 16px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
            margin-bottom: 20px;
        }
        .nav-links a {
            color: #1a3c6e;
            font-weight: 500;
            text-decoration: none;
            padding: 4px 8px;
            border-radius: 12px;
            transition: background 0.2s;
        }
        .nav-links a:hover {
            background: rgba(26, 60, 110, 0.08);
        }
        .nav-link-with-badge {
            position: relative;
            display: inline-block;
        }
        .nav-badge {
            position: absolute;
            top: -6px;
            right: -10px;
            background: #d9534f;
            color: #fff;
            border-radius: 50%;
            padding: 0px 5px;
            font-size: 0.65rem;
            font-weight: bold;
            min-width: 16px;
            text-align: center;
            line-height: 16px;
        }
        .nav-badge.hidden {
            display: none;
        }
        .category-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(4px);
            padding: 8px 12px;
            border-radius: 16px;
        }
        .category-btn {
            background: rgba(255,255,255,0.3);
            border: 1px solid rgba(255,255,255,0.5);
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            color: #1a2332;
            white-space: nowrap;
        }
        .category-btn:hover {
            background: rgba(255,255,255,0.7);
        }
        .category-btn.active {
            background: #1a3c6e;
            color: #fff;
            border-color: #1a3c6e;
        }
        .category-btn.has-children {
            background: rgba(255,215,0,0.15);
        }
        .category-child-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-left: 8px;
            padding-left: 8px;
            border-left: 1px solid rgba(0,0,0,0.06);
        }
        .empty {
            text-align: center;
            color: #8b9aab;
            padding: 40px 0;
        }
        .announcement-bar {
            background: rgba(255,215,0,0.1);
            padding: 8px 12px;
            border-radius: 12px;
            margin-bottom: 12px;
            border-left: 4px solid #ffc107;
        }
        @media (max-width: 600px) {
            .container { padding: 16px; }
            .header h1 { font-size: 1.3rem; }
            .post-meta { font-size: 0.75rem; gap: 6px; }
            .category-nav { flex-direction: column; align-items: stretch; }
            .category-child-wrap { border-left: none; padding-left: 0; margin-left: 0; }
        }
    </style>
</head>
<body>
    <div class="container" style="max-width: 720px;">
        <!-- 顶部 -->
        <div class="header">
            <h1>📚 梅陇中学论坛</h1>
            <div class="header-actions">
                <button id="createBtn" class="btn-primary" style="display:none;">➕ 发帖</button>
                <span id="userInfo"></span>
                <button id="logoutBtn" class="btn-secondary" style="display:none;">退出</button>
            </div>
        </div>

        <!-- 导航 -->
        <div class="nav-links">
            <a href="/index.html">🏠 首页</a>
            <a href="/dashboard.html">👤 个人中心</a>
            <a href="/inbox.html" class="nav-link-with-badge">
                📩 私信
                <span id="navUnreadBadge" class="nav-badge hidden">0</span>
            </a>
            <a href="/adminLogin.html">🔑 管理</a>
        </div>

        <!-- 公告栏 -->
        <div id="announcementBar"></div>

        <!-- 分类导航（树形） -->
        <div id="categoryNav" class="category-nav"></div>

        <!-- 帖子列表 -->
        <div id="postList" class="post-list">加载中...</div>
    </div>

    <script>
        // ---------- 加载公告 ----------
        async function loadAnnouncements() {
            try {
                const res = await fetch('/api/announcement');
                const data = await res.json();
                const bar = document.getElementById('announcementBar');
                if (data.announcements && data.announcements.length > 0) {
                    let html = '<div class="announcement-bar">';
                    data.announcements.forEach(a => {
                        html += `<div><strong>📢 ${a.title}</strong>: ${a.content}</div>`;
                    });
                    html += '</div>';
                    bar.innerHTML = html;
                } else {
                    bar.innerHTML = '';
                }
            } catch (e) {}
        }

        // ---------- 检查登录 ----------
        async function checkLogin() {
            try {
                const res = await fetch('/api/user', { credentials: 'include' });
                if (res.status === 200) {
                    const data = await res.json();
                    document.getElementById('userInfo').innerHTML = '👋 ' + data.user.name;
                    document.getElementById('createBtn').style.display = 'inline-block';
                    document.getElementById('logoutBtn').style.display = 'inline-block';
                }
            } catch (e) {}
        }

        // ---------- 更新未读小红点 ----------
        async function updateNavBadge() {
            try {
                const res = await fetch('/api/inbox', { credentials: 'include' });
                if (res.status !== 200) return;
                const data = await res.json();
                const unreadCount = data.messages ? data.messages.filter(m => !m.read).length : 0;
                const badge = document.getElementById('navUnreadBadge');
                if (badge) {
                    if (unreadCount > 0) {
                        badge.textContent = unreadCount;
                        badge.classList.remove('hidden');
                    } else {
                        badge.classList.add('hidden');
                    }
                }
            } catch (e) {}
        }

        // ---------- 加载分类导航（树形） ----------
        let currentCategoryId = 0;

        async function loadCategoryNav() {
            try {
                const res = await fetch('/api/categories');
                const data = await res.json();
                const tree = data.categories || [];
                const nav = document.getElementById('categoryNav');
                if (tree.length === 0) {
                    nav.innerHTML = '<span style="color:#999;">暂无分类</span>';
                    return;
                }
                // 递归生成分类按钮（平铺，但用缩进和子容器）
                function renderNav(nodes, level = 0) {
                    let html = '';
                    nodes.forEach(node => {
                        const hasChildren = node.children && node.children.length > 0;
                        const cls = hasChildren ? 'category-btn has-children' : 'category-btn';
                        html += `
                            <button class="${cls}" data-category="${node.id}" style="margin-left: ${level * 12}px;">
                                ${node.name}
                            </button>
                        `;
                        if (hasChildren) {
                            html += `<div class="category-child-wrap">`;
                            html += renderNav(node.children, level + 1);
                            html += `</div>`;
                        }
                    });
                    return html;
                }
                nav.innerHTML = renderNav(tree);

                // 绑定点击事件
                nav.querySelectorAll('.category-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const catId = parseInt(this.dataset.category);
                        // 移除其他active
                        nav.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                        this.classList.add('active');
                        currentCategoryId = catId;
                        loadPosts(catId);
                    });
                });

                // 默认选中"全部"（但我们没有全部按钮，可添加）
                // 在树形顶部添加一个"全部"按钮
                const allBtn = document.createElement('button');
                allBtn.className = 'category-btn active';
                allBtn.dataset.category = '0';
                allBtn.textContent = '全部';
                allBtn.addEventListener('click', function() {
                    nav.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentCategoryId = 0;
                    loadPosts(0);
                });
                nav.prepend(allBtn);
                // 将"全部"按钮放在最前面
            } catch (err) {
                console.error('加载分类失败', err);
                document.getElementById('categoryNav').innerHTML = '<div style="color:red;">加载分类失败</div>';
            }
        }

        // ---------- 加载帖子 ----------
        async function loadPosts(categoryId = 0) {
            try {
                const url = categoryId ? `/api/posts?category=${categoryId}` : '/api/posts';
                const res = await fetch(url);
                const data = await res.json();
                const container = document.getElementById('postList');
                if (!data.posts || data.posts.length === 0) {
                    container.innerHTML = '<div class="empty">📭 暂无帖子</div>';
                    return;
                }
                let html = '';
                data.posts.forEach(p => {
                    const time = new Date(p.createdAt).toLocaleString('zh-CN');
                    html += `
                        <div class="post-item" onclick="location.href='/post.html?id=${p.id}'">
                            <div class="post-title">${p.title}</div>
                            <div class="post-meta">
                                <span>📂 ${p.categoryName || '未分类'}</span>
                                <span>✍️ <a href="/profile.html?uid=${p.authorUid}" onclick="event.stopPropagation();">${p.authorName}</a></span>
                                <span>🕒 ${time}</span>
                                <span>💬 ${p.replyCount}</span>
                                <span>👍 ${p.likesCount}</span>
                                <span>👎 ${p.dislikesCount}</span>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            } catch (err) {
                document.getElementById('postList').innerHTML = '<div style="color:red;">加载失败</div>';
            }
        }

        // ---------- 退出 ----------
        document.getElementById('logoutBtn')?.addEventListener('click', async function() {
            await fetch('/api/logout', { credentials: 'include' });
            window.location.href = '/login.html';
        });
        document.getElementById('createBtn')?.addEventListener('click', function() {
            window.location.href = '/createPost.html';
        });

        // ---------- 启动 ----------
        checkLogin();
        updateNavBadge();
        loadAnnouncements();
        loadCategoryNav();
        loadPosts();
    </script>
</body>
</html>
