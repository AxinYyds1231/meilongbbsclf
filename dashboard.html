<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>个人中心</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .post-item { background: #f9f9f9; padding: 10px 14px; border-radius: 4px; margin-bottom: 8px; cursor: pointer; }
        .post-item:hover { background: #f0f0f0; }
        .post-title { font-weight: bold; color: #1a3c6e; }
        .post-meta { font-size: 0.85em; color: #666; }
        .nav-links { margin-bottom: 16px; display: flex; gap: 15px; flex-wrap: wrap; }
        .nav-links a { color: #1a3c6e; text-decoration: none; }
        .nav-links a:hover { text-decoration: underline; }
        .btn-group { margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
        .btn-group button { padding: 6px 16px; border: none; border-radius: 4px; cursor: pointer; }
        .btn-edit { background: #337ab7; color: white; }
        .btn-logout { background: #888; color: white; }
        .btn-delete { background: #d9534f; color: white; }
        .btn-edit:hover { background: #286090; }
        .btn-logout:hover { background: #666; }
        .btn-delete:hover { background: #c9302c; }
        .avatar-container { display: flex; align-items: center; gap: 20px; margin-bottom: 16px; flex-wrap: wrap; }
        .avatar-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid #ccc; }
        .avatar-upload { display: flex; flex-direction: column; gap: 6px; }
        .avatar-upload input[type="file"] { max-width: 150px; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 700px;">
        <div class="nav-links">
            <a href="/index.html">🏠 首页</a>
            <a href="/dashboard.html">👤 个人中心</a>
            <a href="/adminLogin.html">🔑 管理</a>
        </div>
        <h1>👤 个人中心</h1>

        <!-- 头像区域 -->
        <div class="avatar-container">
            <img id="avatarImg" class="avatar-img" src="" alt="头像">
            <div class="avatar-upload">
                <input type="file" id="avatarInput" accept="image/*">
                <button id="uploadAvatarBtn" class="btn-primary" style="padding:4px 12px;">上传头像</button>
            </div>
        </div>

        <div id="userInfo">加载中...</div>
        <h3>📝 我的帖子</h3>
        <div id="myPosts">加载中...</div>
        <div class="btn-group">
            <button class="btn-edit" onclick="location.href='/updateUser.html'">✏️ 修改信息</button>
            <button class="btn-logout" id="logoutBtn">🚪 退出登录</button>
            <button class="btn-delete" id="deleteAccountBtn">🗑️ 注销账号</button>
        </div>
    </div>

    <script>
        async function loadProfile() {
            try {
                const res = await fetch('/api/user', { credentials: 'include' });
                if (res.status === 401) {
                    window.location.href = '/login.html';
                    return;
                }
                const data = await res.json();
                const user = data.user;
                if (user.avatar) {
                    document.getElementById('avatarImg').src = user.avatar;
                }
                document.getElementById('userInfo').innerHTML = `
                    <p><strong>姓名：</strong>${user.name}</p>
                    <p><strong>UID：</strong>${user.uid}</p>
                `;
                const postsRes = await fetch('/api/posts');
                const postsData = await postsRes.json();
                const myPosts = postsData.posts.filter(p => p.authorName === user.name);
                const container = document.getElementById('myPosts');
                if (myPosts.length === 0) {
                    container.innerHTML = '<div style="color:#999;">你还没有发布过帖子</div>';
                } else {
                    let html = '';
                    myPosts.forEach(p => {
                        const time = new Date(p.createdAt).toLocaleString('zh-CN');
                        html += `
                            <div class="post-item" onclick="location.href='/post.html?id=${p.id}'">
                                <div class="post-title">${p.title}</div>
                                <div class="post-meta">🕒 ${time}  ·  💬 ${p.replyCount} 回复</div>
                            </div>
                        `;
                    });
                    container.innerHTML = html;
                }
            } catch (err) {
                document.getElementById('userInfo').innerHTML = '<div style="color:red;">加载失败</div>';
            }
        }

        // 上传头像
        document.getElementById('uploadAvatarBtn')?.addEventListener('click', async function() {
            const fileInput = document.getElementById('avatarInput');
            if (!fileInput.files.length) {
                alert('请选择图片');
                return;
            }
            const formData = new FormData();
            formData.append('avatar', fileInput.files[0]);
            try {
                const res = await fetch('/api/uploadAvatar', {
                    method: 'POST',
                    credentials: 'include',
                    body: formData
                });
                const result = await res.json();
                if (result.success) {
                    document.getElementById('avatarImg').src = result.avatar;
                    alert('头像更新成功！');
                } else {
                    alert(result.error || '上传失败');
                }
            } catch (err) {
                alert('网络错误，请重试');
            }
        });

        document.getElementById('logoutBtn')?.addEventListener('click', async function() {
            await fetch('/api/logout', { credentials: 'include' });
            window.location.href = '/login.html';
        });

        document.getElementById('deleteAccountBtn')?.addEventListener('click', async function() {
            const password = prompt('请输入您的密码以确认注销账号：');
            if (password === null) return;
            if (!password) {
                alert('密码不能为空');
                return;
            }
            if (!confirm('确定要注销账号吗？此操作不可恢复！')) return;
            const formData = new FormData();
            formData.append('password', password);
            try {
                const res = await fetch('/api/deleteAccount', {
                    method: 'POST',
                    credentials: 'include',
                    body: formData
                });
                const result = await res.json();
                if (result.success) {
                    alert('账号已注销');
                    window.location.href = '/login.html';
                } else {
                    alert(result.error || '注销失败');
                }
            } catch (err) {
                alert('网络错误，请重试');
            }
        });

        loadProfile();
    </script>
</body>
</html>
