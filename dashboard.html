<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .profile-card {
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 16px;
        }
        .profile-card .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.8);
        }
        .profile-card .info {
            flex: 1;
        }
        .profile-card .info h2 { margin: 0; font-size: 1.2rem; }
        .profile-card .info .level { font-size: 0.9rem; color: #b8860b; }
        .profile-card .info .meta { font-size: 0.9rem; color: #4a5a6a; }
        .profile-card .actions { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
        .notif-item .notif-content { display: flex; justify-content: space-between; align-items: center; }
        .notif-item .delete-notif { background: none; border: none; color: #d9534f; cursor: pointer; font-size: 0.8rem; }
        .notif-item .delete-notif:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <!-- 左侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>👤 个人中心</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="/index.html">🏠 首页</a>
                <a href="/dashboard.html" class="active">👤 我的账户</a>
                <a href="/inbox.html">📩 私信</a>
                <a href="/adminLogin.html">🔑 管理</a>
            </nav>
            <div style="padding:16px; margin-top:auto; border-top:1px solid rgba(0,0,0,0.04);">
                <button id="logoutBtn" class="btn-secondary btn-sm" style="width:100%;">🚪 退出登录</button>
            </div>
        </aside>

        <!-- 右侧主内容 -->
        <main class="main-content">
            <h1 class="page-title">👤 我的账户</h1>

            <!-- 用户信息卡片 -->
            <div id="userInfo" class="profile-card" style="display:flex; align-items:center; gap:20px; flex-wrap:wrap;">
                <img id="avatarImg" class="avatar" src="" alt="头像">
                <div class="info">
                    <h2 id="userName">用户</h2>
                    <span class="level" id="levelBadge">🌱 新手</span>
                    <div class="meta">
                        <span id="userUid">UID: -</span>
                        <span id="userGrade">年级: -</span>
                        <span id="userClass">班级: -</span>
                        <span id="userPoints">积分: 0</span>
                    </div>
                    <div class="actions">
                        <button class="btn-primary btn-sm" onclick="location.href='/updateUser.html'">✏️ 修改信息</button>
                        <button class="btn-primary btn-sm" onclick="location.href='/favorites.html'">⭐ 收藏</button>
                        <button id="deleteAccountBtn" class="btn-danger btn-sm">🗑️ 注销账号</button>
                    </div>
                </div>
            </div>

            <!-- 简介编辑 -->
            <div class="profile-card">
                <div style="font-weight:600; margin-bottom:4px;">📝 个人简介</div>
                <textarea id="bioText" rows="2" placeholder="写点自我介绍..." style="width:100%; padding:8px; border-radius:12px; border:1px solid rgba(0,0,0,0.06); background:rgba(255,255,255,0.5);"></textarea>
                <button id="saveBioBtn" class="btn-primary btn-sm" style="margin-top:4px;">💾 保存简介</button>
            </div>

            <!-- 通知列表 -->
            <h3 style="margin-top:16px; font-size:1.1rem;">📬 我的通知</h3>
            <div id="notifications">加载中...</div>

            <!-- 我的帖子 -->
            <h3 style="margin-top:16px; font-size:1.1rem;">📝 我的帖子</h3>
            <div id="myPosts">加载中...</div>
        </main>
    </div>

    <script>
        // ---- 加载个人数据 ----
        async function loadDashboard() {
            try {
                const res = await fetch('/api/user', { credentials: 'include' });
                if (res.status === 401) { window.location.href = '/login.html'; return; }
                const userData = await res.json();
                const uid = userData.user.uid;

                const profileRes = await fetch(`/api/getUserProfile?uid=${uid}`);
                const profileData = await profileRes.json();
                const u = profileData.user;

                document.getElementById('avatarImg').src = u.avatar || '';
                document.getElementById('userName').textContent = u.name;
                document.getElementById('levelBadge').textContent = `${u.levelIcon} ${u.level}`;
                document.getElementById('userUid').textContent = `UID: ${u.uid}`;
                document.getElementById('userGrade').textContent = `年级: ${u.grade}`;
                document.getElementById('userClass').textContent = `班级: ${u.class}`;
                document.getElementById('userPoints').textContent = `积分: ${u.points}`;
                document.getElementById('bioText').value = u.bio || '';

                // 通知
                await loadNotifications();

                // 我的帖子
                const postsRes = await fetch('/api/posts');
                const postsData = await postsRes.json();
                const myPosts = postsData.posts.filter(p => p.authorName === u.name);
                const container = document.getElementById('myPosts');
                if (myPosts.length === 0) {
                    container.innerHTML = '<div style="color:#999;">还没有发布过帖子</div>';
                } else {
                    let html = '';
                    myPosts.forEach(p => {
                        html += `<div class="list-item" onclick="location.href='/post.html?id=${p.id}'" style="cursor:pointer;">
                            <div class="title">${p.title}</div>
                            <div class="meta">🕒 ${new Date(p.createdAt).toLocaleString()} · 💬 ${p.replyCount}</div>
                        </div>`;
                    });
                    container.innerHTML = html;
                }
            } catch (err) {
                document.getElementById('userInfo').innerHTML = '<div style="color:red;">加载失败</div>';
            }
        }

        // ---- 加载通知（可删除） ----
        async function loadNotifications() {
            try {
                const res = await fetch('/api/notifications', { credentials: 'include' });
                const data = await res.json();
                const container = document.getElementById('notifications');
                if (!data.notifications || data.notifications.length === 0) {
                    container.innerHTML = '<div style="color:#999;">暂无通知</div>';
                    return;
                }
                let html = '';
                data.notifications.forEach(n => {
                    const cls = n.read ? '' : 'unread';
                    const time = new Date(n.createdAt).toLocaleString('zh-CN');
                    html += `
                        <div class="notif-item ${cls}">
                            <div class="notif-content">
                                <span>${n.content} <span style="font-size:0.75rem;color:#8b9aab;">${time}</span></span>
                                <button class="delete-notif" data-id="${n.id}">删除</button>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;

                // 绑定删除事件
                container.querySelectorAll('.delete-notif').forEach(btn => {
                    btn.addEventListener('click', async function() {
                        const id = parseInt(this.dataset.id);
                        if (!confirm('确定删除此通知？')) return;
                        try {
                            const fd = new FormData();
                            fd.append('id', id);
                            const res = await fetch('/api/deleteNotification', {
                                method: 'POST',
                                credentials: 'include',
                                body: fd
                            });
                            const result = await res.json();
                            if (result.success) {
                                loadNotifications(); // 刷新
                            } else {
                                alert(result.error || '删除失败');
                            }
                        } catch (err) {
                            alert('网络错误');
                        }
                    });
                });
            } catch (err) {
                document.getElementById('notifications').innerHTML = '<div style="color:red;">加载失败</div>';
            }
        }

        // ---- 保存简介 ----
        document.getElementById('saveBioBtn').addEventListener('click', async function() {
            const bio = document.getElementById('bioText').value.trim();
            const fd = new FormData();
            fd.append('bio', bio);
            try {
                const res = await fetch('/api/updateProfile', { method: 'POST', credentials: 'include', body: fd });
                const result = await res.json();
                if (result.success) alert('✅ 简介已保存');
                else alert(result.error);
            } catch (err) { alert('网络错误'); }
        });

        // ---- 退出 ----
        document.getElementById('logoutBtn').addEventListener('click', async function() {
            await fetch('/api/logout', { credentials: 'include' });
            window.location.href = '/login.html';
        });

        // ---- 注销 ----
        document.getElementById('deleteAccountBtn').addEventListener('click', async function() {
            const pwd = prompt('请输入密码确认注销：');
            if (!pwd) return;
            const fd = new FormData();
            fd.append('password', pwd);
            try {
                const res = await fetch('/api/deleteAccount', { method: 'POST', credentials: 'include', body: fd });
                const result = await res.json();
                if (result.success) { alert('账号已注销'); window.location.href = '/login.html'; }
                else alert(result.error);
            } catch (err) { alert('网络错误'); }
        });

        loadDashboard();
    </script>
</body>
</html>
