<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>个人中心</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .avatar-container { display: flex; align-items: center; gap: 20px; margin-bottom: 16px; flex-wrap: wrap; }
        .avatar-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid #ccc; }
        .avatar-upload { display: flex; flex-direction: column; gap: 6px; }
        .bio-edit { margin-top: 16px; }
        .bio-edit textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .notif-item { background: #f4f4f4; padding: 8px; border-radius: 4px; margin-bottom: 4px; }
        .notif-item.unread { background: #e8f0fe; border-left: 4px solid #1a3c6e; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 700px;">
        <div class="nav-links">
            <a href="/index.html">🏠 首页</a>
            <a href="/dashboard.html">👤 个人中心</a>
            <a href="/inbox.html">📩 私信</a>
            <a href="/adminLogin.html">🔑 管理</a>
        </div>
        <h1>👤 个人中心</h1>

        <div id="userInfo">加载中...</div>

        <div class="bio-edit">
            <h3>📝 个人简介</h3>
            <textarea id="bioText" rows="3" placeholder="写点自我介绍..."></textarea>
            <button id="saveBioBtn" class="btn-primary" style="margin-top:6px;">保存简介</button>
        </div>

        <h3>📬 我的通知</h3>
        <div id="notifications">加载中...</div>

        <h3>📝 我的帖子</h3>
        <div id="myPosts">加载中...</div>
        <button class="btn-primary" onclick="location.href='/updateUser.html'">✏️ 修改信息</button>
        <button id="logoutBtn" style="background:#888;">🚪 退出登录</button>
        <button id="deleteAccountBtn" style="background:#d9534f;">🗑️ 注销账号</button>
    </div>

    <script>
        async function loadDashboard() {
            try {
                const res = await fetch('/api/user', { credentials: 'include' });
                if (res.status === 401) { window.location.href = '/login.html'; return; }
                const data = await res.json();
                const user = data.user;
                document.getElementById('userInfo').innerHTML = `
                    <div class="avatar-container">
                        <img src="${user.avatar || ''}" class="avatar-img">
                        <div><p><strong>${user.name}</strong></p>
                        <p>UID: ${user.uid}</p>
                        <p>年级: ${user.grade} 班级: ${user.class}</p></div>
                    </div>
                `;
                document.getElementById('bioText').value = user.bio || '';

                // 通知
                const notifRes = await fetch('/api/notifications', { credentials: 'include' });
                const notifData = await notifRes.json();
                const notifContainer = document.getElementById('notifications');
                if (notifData.notifications.length === 0) {
                    notifContainer.innerHTML = '<div style="color:#999;">暂无通知</div>';
                } else {
                    let html = '';
                    notifData.notifications.forEach(n => {
                        const cls = n.read ? '' : 'unread';
                        html += `<div class="notif-item ${cls}">${n.content} <span style="font-size:0.8em;color:#888;">${new Date(n.createdAt).toLocaleString()}</span></div>`;
                    });
                    notifContainer.innerHTML = html;
                }

                // 我的帖子
                const postsRes = await fetch('/api/posts');
                const postsData = await postsRes.json();
                const myPosts = postsData.posts.filter(p => p.authorName === user.name);
                const container = document.getElementById('myPosts');
                if (myPosts.length === 0) {
                    container.innerHTML = '<div style="color:#999;">还没有帖子</div>';
                } else {
                    let html = '';
                    myPosts.forEach(p => {
                        html += `<div class="post-item" onclick="location.href='/post.html?id=${p.id}'">${p.title}</div>`;
                    });
                    container.innerHTML = html;
                }
            } catch (err) {
                document.getElementById('userInfo').innerHTML = '<div style="color:red;">加载失败</div>';
            }
        }

        document.getElementById('saveBioBtn').addEventListener('click', async function() {
            const bio = document.getElementById('bioText').value.trim();
            const formData = new FormData();
            formData.append('bio', bio);
            try {
                const res = await fetch('/api/updateProfile', { method: 'POST', credentials: 'include', body: formData });
                const result = await res.json();
                if (result.success) alert('保存成功');
                else alert(result.error);
            } catch (err) { alert('网络错误'); }
        });

        document.getElementById('logoutBtn').addEventListener('click', async function() {
            await fetch('/api/logout', { credentials: 'include' });
            window.location.href = '/login.html';
        });

        document.getElementById('deleteAccountBtn').addEventListener('click', async function() {
            const pwd = prompt('请输入密码确认注销：');
            if (!pwd) return;
            const fd = new FormData();
            fd.append('password', pwd);
            const res = await fetch('/api/deleteAccount', { method: 'POST', credentials: 'include', body: fd });
            const result = await res.json();
            if (result.success) { alert('已注销'); window.location.href = '/login.html'; }
            else alert(result.error);
        });

        loadDashboard();
    </script>
</body>
</html>
