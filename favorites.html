<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的收藏</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .fav-item {
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(4px);
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 8px;
            border: 1px solid rgba(255,255,255,0.3);
            cursor: pointer;
            transition: 0.2s;
        }
        .fav-item:hover {
            background: rgba(255,255,255,0.6);
        }
    </style>
</head>
<body>
    <div class="container" style="max-width: 600px;">
        <div class="nav-links">
            <a href="/index.html">🏠 首页</a>
            <a href="/dashboard.html">👤 个人中心</a>
        </div>
        <h1>⭐ 我的收藏</h1>
        <div id="favList">加载中...</div>
        <a href="/dashboard.html" style="display:inline-block; margin-top:16px;">← 返回个人中心</a>
    </div>

    <script>
        async function loadFavorites() {
            try {
                const res = await fetch('/api/favorites', { credentials: 'include' });
                if (res.status === 401) { window.location.href = '/login.html'; return; }
                const data = await res.json();
                const container = document.getElementById('favList');
                if (!data.favorites || data.favorites.length === 0) {
                    container.innerHTML = '<div style="color:#999;">暂无收藏帖子</div>';
                    return;
                }
                let html = '';
                data.favorites.forEach(p => {
                    const time = new Date(p.createdAt).toLocaleString('zh-CN');
                    html += `
                        <div class="fav-item" onclick="location.href='/post.html?id=${p.id}'">
                            <div style="font-weight:600;">${p.title}</div>
                            <div style="font-size:0.85rem;color:#6b7a8a;">✍️ ${p.authorName} · 🕒 ${time} · 💬 ${p.replyCount}</div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            } catch (err) {
                document.getElementById('favList').innerHTML = '<div style="color:red;">加载失败</div>';
            }
        }
        loadFavorites();
    </script>
</body>
</html>
