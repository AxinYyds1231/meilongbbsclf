<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .admin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin: 16px 0;
        }
        .admin-grid a {
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(4px);
            padding: 14px;
            border-radius: 14px;
            text-align: center;
            text-decoration: none;
            color: #1a2332;
            border: 1px solid rgba(255,255,255,0.3);
            transition: 0.2s;
            font-weight: 500;
        }
        .admin-grid a:hover {
            background: rgba(255,255,255,0.6);
            transform: translateY(-2px);
        }
        hr {
            border: none;
            border-top: 1px solid rgba(0,0,0,0.06);
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container" style="max-width: 720px;">
        <h1 class="page-title">🔧 管理后台</h1>
        <div class="admin-grid">
            <a href="/adminUsers.html">👥 用户管理</a>
            <a href="/adminPosts.html">📝 帖子管理</a>
            <a href="/adminCategories.html">📂 分类管理</a>
            <a href="/adminStats.html">📊 统计面板</a>
            <a href="/adminSensitive.html">🛡️ 敏感词</a>
            <a href="/adminAnnouncement.html">📢 公告</a>
        </div>

        <hr>
        <h2 style="font-size:1.1rem; margin-bottom:12px;">🔑 修改管理员密码</h2>
        <div id="pwdError" class="error" style="display:none;"></div>
        <div id="pwdSuccess" class="success" style="display:none;"></div>
        <form id="changePwdForm">
            <div class="form-group">
                <label>旧密码</label>
                <input type="password" id="oldPassword" required>
            </div>
            <div class="form-group">
                <label>新密码</label>
                <input type="password" id="newPassword" required minlength="8">
            </div>
            <div class="form-group">
                <label>确认新密码</label>
                <input type="password" id="confirmPassword" required>
            </div>
            <button type="submit" class="btn-primary">更新密码</button>
        </form>

        <hr>
        <button onclick="logoutAdmin()" class="btn-secondary">退出管理</button>
    </div>

    <script>
        document.getElementById('changePwdForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const oldPassword = document.getElementById('oldPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorEl = document.getElementById('pwdError');
            const successEl = document.getElementById('pwdSuccess');
            errorEl.style.display = 'none';
            successEl.style.display = 'none';

            if (newPassword !== confirmPassword) {
                errorEl.textContent = '两次新密码不一致';
                errorEl.style.display = 'block';
                return;
            }
            if (newPassword.length < 8) {
                errorEl.textContent = '新密码至少8位';
                errorEl.style.display = 'block';
                return;
            }

            const fd = new FormData();
            fd.append('oldPassword', oldPassword);
            fd.append('newPassword', newPassword);
            fd.append('confirmPassword', confirmPassword);

            try {
                const res = await fetch('/api/adminChangePassword', {
                    method: 'POST',
                    credentials: 'include',
                    body: fd
                });
                const result = await res.json();
                if (result.success) {
                    successEl.textContent = '密码更新成功！';
                    successEl.style.display = 'block';
                    document.getElementById('oldPassword').value = '';
                    document.getElementById('newPassword').value = '';
                    document.getElementById('confirmPassword').value = '';
                } else {
                    errorEl.textContent = result.error || '修改失败';
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                errorEl.textContent = '网络错误，请重试';
                errorEl.style.display = 'block';
            }
        });

        async function logoutAdmin() {
            document.cookie = 'adminSession=; Path=/; Max-Age=0';
            window.location.href = '/adminLogin.html';
        }
    </script>
</body>
</html>
