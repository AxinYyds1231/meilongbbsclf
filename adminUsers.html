<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>管理员 - 用户管理</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .table-wrapper { max-height: 400px; overflow-y: auto; }
        .edit-btn { background: #337ab7; color: white; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; }
        .edit-btn:hover { background: #286090; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            max-width: 400px;
            width: 90%;
        }
        .modal-content input, .modal-content select { width: 100%; margin: 6px 0; padding: 6px; }
        .modal-content button { margin-top: 10px; }
        .nav-links { margin-bottom: 16px; display: flex; gap: 15px; flex-wrap: wrap; }
        .nav-links a { color: #1a3c6e; text-decoration: none; }
        .nav-links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 800px;">
        <div class="nav-links">
            <a href="/index.html">🏠 首页</a>
            <a href="/adminDashboard.html">🔙 管理后台</a>
        </div>
        <h1>👥 所有用户</h1>
        <div id="error" class="error" style="display:none;"></div>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>UID</th>
                        <th>姓名</th>
                        <th>性别</th>
                        <th>年级</th>
                        <th>班级</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="userList">
                    <tr><td colspan="6">加载中...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- 编辑弹窗 -->
        <div id="editModal" class="modal">
            <div class="modal-content">
                <h3>编辑用户信息</h3>
                <input type="hidden" id="editUid">
                <input type="text" id="editName" placeholder="姓名">
                <select id="editGender">
                    <option value="男">男</option>
                    <option value="女">女</option>
                </select>
                <!-- 年级下拉：value 用数字 -->
                <select id="editGrade">
                    <option value="6">六年级</option>
                    <option value="7">七年级</option>
                    <option value="8">八年级</option>
                    <option value="9">九年级</option>
                </select>
                <select id="editClass">
                    <option value="1">1班</option><option value="2">2班</option>
                    <option value="3">3班</option><option value="4">4班</option>
                    <option value="5">5班</option><option value="6">6班</option>
                    <option value="7">7班</option><option value="8">8班</option>
                    <option value="9">9班</option><option value="10">10班</option>
                    <option value="11">11班</option><option value="12">12班</option>
                    <option value="13">13班</option>
                </select>
                <button id="saveEditBtn" class="btn-primary">保存</button>
                <button onclick="closeModal()">取消</button>
            </div>
        </div>

        <p><a href="/adminDashboard.html">返回管理后台</a></p>
    </div>

    <script>
        let currentUserList = [];

        async function loadUsers() {
            try {
                const res = await fetch('/api/adminDashboard', { credentials: 'include' });
                if (res.status === 401 || res.status === 403) {
                    window.location.href = '/adminLogin.html';
                    return;
                }
                const data = await res.json();
                currentUserList = data.users || [];
                renderTable(currentUserList);
            } catch (err) {
                document.getElementById('error').textContent = '加载失败，请刷新重试';
                document.getElementById('error').style.display = 'block';
            }
        }

        function renderTable(users) {
            const tbody = document.getElementById('userList');
            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6">暂无用户</td></tr>';
                return;
            }
            let html = '';
            users.forEach(u => {
                html += `
                    <tr>
                        <td>${u.uid}</td>
                        <td>${u.name}</td>
                        <td>${u.gender}</td>
                        <td>${u.grade}</td>
                        <td>${u.class}</td>
                        <td><button class="edit-btn" data-uid="${u.uid}">编辑</button></td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;

            document.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const uid = this.dataset.uid;
                    const user = currentUserList.find(u => u.uid === uid);
                    if (user) openEditModal(user);
                });
            });
        }

        function openEditModal(user) {
            document.getElementById('editUid').value = user.uid;
            document.getElementById('editName').value = user.name;
            document.getElementById('editGender').value = user.gender;
            // 设置年级下拉为数字（若数据库中年级是数字，直接赋值；若为空则默认为6）
            document.getElementById('editGrade').value = user.grade || 6;
            document.getElementById('editClass').value = user.class || 1;
            document.getElementById('editModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        document.getElementById('saveEditBtn').addEventListener('click', async function() {
            const uid = document.getElementById('editUid').value;
            const name = document.getElementById('editName').value.trim();
            const gender = document.getElementById('editGender').value;
            const grade = document.getElementById('editGrade').value;
            const cls = document.getElementById('editClass').value;

            if (!name || !gender || !grade || !cls) {
                alert('请填写完整信息');
                return;
            }

            const formData = new FormData();
            formData.append('uid', uid);
            formData.append('name', name);
            formData.append('gender', gender);
            formData.append('grade', grade);
            formData.append('class', cls);

            try {
                const res = await fetch('/api/adminUpdateUser', {
                    method: 'POST',
                    credentials: 'include',
                    body: formData
                });
                const result = await res.json();
                if (result.success) {
                    alert('修改成功！');
                    closeModal();
                    loadUsers();
                } else {
                    alert(result.error || '修改失败');
                }
            } catch (err) {
                alert('网络错误，请重试');
            }
        });

        document.getElementById('editModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        loadUsers();
    </script>
</body>
</html>
