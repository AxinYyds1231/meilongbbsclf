<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .table-wrapper {
            max-height: 450px;
            overflow-y: auto;
            border-radius: 16px;
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(4px);
            padding: 4px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }
        th {
            background: rgba(26, 60, 110, 0.1);
            padding: 10px 12px;
            text-align: left;
            font-weight: 600;
            color: #1a2332;
            position: sticky;
            top: 0;
            backdrop-filter: blur(4px);
        }
        td {
            padding: 10px 12px;
            border-bottom: 1px solid rgba(0,0,0,0.04);
        }
        .delete-btn {
            background: rgba(217, 83, 79, 0.15);
            color: #d9534f;
            border: 1px solid rgba(217,83,79,0.2);
            padding: 4px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .delete-btn:hover {
            background: #d9534f;
            color: #fff;
        }
        .edit-btn {
            background: rgba(26, 60, 110, 0.1);
            color: #1a3c6e;
            border: 1px solid rgba(26,60,110,0.15);
            padding: 4px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
            margin-right: 4px;
        }
        .edit-btn:hover {
            background: #1a3c6e;
            color: #fff;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 999;
        }
        .modal-content {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(20px);
            padding: 28px 32px;
            border-radius: 28px;
            max-width: 400px;
            width: 90%;
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: 0 8px 40px rgba(0,0,0,0.1);
        }
        .modal-content h3 {
            margin-bottom: 16px;
            color: #1a2332;
        }
        .modal-content input,
        .modal-content select {
            width: 100%;
            padding: 10px 14px;
            margin: 6px 0;
            border-radius: 14px;
            border: 1px solid rgba(0,0,0,0.06);
            background: rgba(255,255,255,0.6);
            font-size: 1rem;
            transition: border 0.2s;
        }
        .modal-content input:focus,
        .modal-content select:focus {
            outline: none;
            border-color: #1a3c6e;
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        .modal-actions button {
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="container" style="max-width: 850px;">
        <div class="nav-links">
            <a href="/index.html">🏠 首页</a>
            <a href="/adminDashboard.html">🔙 管理后台</a>
        </div>
        <h1 style="margin-bottom: 16px;">👥 用户管理</h1>
        <div id="error" class="error" style="display:none; background:rgba(217,83,79,0.12); padding:12px; border-radius:14px; margin-bottom:14px;"></div>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>UID</th>
                        <th>姓名</th>
                        <th>性别</th>
                        <th>年级</th>
                        <th>班级</th>
                        <th style="text-align:center;">操作</th>
                    </tr>
                </thead>
                <tbody id="userList">
                    <tr><td colspan="6" style="text-align:center; padding:30px; color:#8b9aab;">加载中...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- 编辑模态框 -->
        <div id="editModal" class="modal">
            <div class="modal-content">
                <h3>✏️ 编辑用户</h3>
                <input type="hidden" id="editUid">
                <input type="text" id="editName" placeholder="姓名">
                <select id="editGender">
                    <option value="男">男</option>
                    <option value="女">女</option>
                </select>
                <select id="editGrade">
                    <option value="6">六年级</option>
                    <option value="7">七年级</option>
                    <option value="8">八年级</option>
                    <option value="9">九年级</option>
                </select>
                <select id="editClass">
                    <option value="1">1班</option><option value="2">2班</option>
                    <option value="3">3班</option><option value="4">4班</option>
                    <option value="5">5班</option><option value="6">6班</option>
                    <option value="7">7班</option><option value="8">8班</option>
                    <option value="9">9班</option><option value="10">10班</option>
                    <option value="11">11班</option><option value="12">12班</option>
                    <option value="13">13班</option>
                </select>
                <div class="modal-actions">
                    <button id="saveEditBtn" class="btn-primary">保存</button>
                    <button onclick="closeModal()" class="btn-secondary">取消</button>
                </div>
            </div>
        </div>

        <a href="/adminDashboard.html" style="display:inline-block; margin-top:16px; color:#1a3c6e;">← 返回管理后台</a>
    </div>

    <script>
        let currentUserList = [];

        async function loadUsers() {
            try {
                const res = await fetch('/api/adminDashboard', { credentials: 'include' });
                if (res.status === 401 || res.status === 403) {
                    window.location.href = '/adminLogin.html';
                    return;
                }
                const data = await res.json();
                currentUserList = data.users || [];
                renderTable(currentUserList);
            } catch (err) {
                document.getElementById('error').textContent = '加载失败，请刷新重试';
                document.getElementById('error').style.display = 'block';
            }
        }

        function renderTable(users) {
            const tbody = document.getElementById('userList');
            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:30px; color:#8b9aab;">暂无用户</td></tr>';
                return;
            }
            let html = '';
            users.forEach(u => {
                html += `
                    <tr>
                        <td><code style="background:rgba(0,0,0,0.04); padding:2px 8px; border-radius:6px;">${u.uid}</code></td>
                        <td>${u.name}</td>
                        <td>${u.gender}</td>
                        <td>${u.grade}</td>
                        <td>${u.class}</td>
                        <td style="text-align:center;">
                            <button class="edit-btn" data-uid="${u.uid}" data-name="${u.name}" data-gender="${u.gender}" data-grade="${u.grade}" data-class="${u.class}">编辑</button>
                            <button class="delete-btn" data-uid="${u.uid}">删除</button>
                        </td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;

            document.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    openEditModal(this.dataset.uid, this.dataset.name, this.dataset.gender, this.dataset.grade, this.dataset.class);
                });
            });

            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', async function() {
                    const uid = this.dataset.uid;
                    if (!confirm(`确定删除 ${uid} 吗？此操作不可恢复！`)) return;
                    try {
                        const fd = new FormData();
                        fd.append('uid', uid);
                        const res = await fetch('/api/adminDeleteUser', { method: 'POST', credentials: 'include', body: fd });
                        const result = await res.json();
                        if (result.success) { alert('已删除'); loadUsers(); }
                        else alert(result.error || '删除失败');
                    } catch (err) { alert('网络错误'); }
                });
            });
        }

        function openEditModal(uid, name, gender, grade, cls) {
            document.getElementById('editUid').value = uid;
            document.getElementById('editName').value = name;
            document.getElementById('editGender').value = gender;
            document.getElementById('editGrade').value = grade;
            document.getElementById('editClass').value = cls;
            document.getElementById('editModal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('editModal').style.display = 'none'; }
        document.getElementById('editModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        document.getElementById('saveEditBtn').addEventListener('click', async function() {
            const uid = document.getElementById('editUid').value;
            const name = document.getElementById('editName').value.trim();
            const gender = document.getElementById('editGender').value;
            const grade = document.getElementById('editGrade').value;
            const cls = document.getElementById('editClass').value;
            if (!name || !gender || !grade || !cls) { alert('请填写完整'); return; }
            const fd = new FormData();
            fd.append('uid', uid);
            fd.append('name', name);
            fd.append('gender', gender);
            fd.append('grade', grade);
            fd.append('class', cls);
            try {
                const res = await fetch('/api/adminUpdateUser', { method: 'POST', credentials: 'include', body: fd });
                const result = await res.json();
                if (result.success) { alert('修改成功！'); closeModal(); loadUsers(); }
                else alert(result.error || '修改失败');
            } catch (err) { alert('网络错误'); }
        });

        loadUsers();
    </script>
</body>
</html>
