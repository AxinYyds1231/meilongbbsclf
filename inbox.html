<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私信</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .chat-container {
            display: flex;
            height: 100%;
            gap: 16px;
        }
        .contact-list {
            width: 220px;
            min-width: 220px;
            border-right: 1px solid rgba(0,0,0,0.04);
            padding-right: 12px;
            overflow-y: auto;
        }
        .contact-list .contact-item {
            padding: 8px 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.15s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .contact-list .contact-item:hover {
            background: rgba(255,255,255,0.3);
        }
        .contact-list .contact-item.active {
            background: rgba(26,60,110,0.08);
        }
        .chat-window {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }
        .chat-message {
            margin-bottom: 8px;
            max-width: 75%;
            padding: 8px 14px;
            border-radius: 16px;
            background: rgba(255,255,255,0.5);
            backdrop-filter: blur(4px);
        }
        .chat-message.sent {
            margin-left: auto;
            background: #1a3c6e;
            color: #fff;
        }
        .chat-message .time {
            font-size: 0.7rem;
            color: #8b9aab;
            display: block;
            margin-top: 2px;
        }
        .chat-message.sent .time {
            color: rgba(255,255,255,0.6);
        }
        .chat-input {
            display: flex;
            gap: 8px;
            padding-top: 10px;
            border-top: 1px solid rgba(0,0,0,0.04);
        }
        .chat-input textarea {
            flex: 1;
            padding: 8px 12px;
            border-radius: 12px;
            border: 1px solid rgba(0,0,0,0.06);
            background: rgba(255,255,255,0.5);
            resize: none;
            font-family: inherit;
        }
        .chat-input button {
            align-self: flex-end;
        }
        @media (max-width: 768px) {
            .contact-list { width: 100%; min-width: unset; border-right: none; border-bottom: 1px solid rgba(0,0,0,0.04); max-height: 150px; }
            .chat-container { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <!-- 左侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header"><h2>📩 私信</h2></div>
            <nav class="sidebar-nav">
                <a href="/index.html">🏠 首页</a>
                <a href="/dashboard.html">👤 个人中心</a>
                <a href="/inbox.html" class="active">📩 私信</a>
                <a href="/adminLogin.html">🔑 管理</a>
            </nav>
        </aside>

        <!-- 右侧聊天区域 -->
        <main class="main-content" style="padding:16px 20px;">
            <div class="chat-container" style="height:100%;">
                <!-- 联系人列表 -->
                <div class="contact-list" id="contactList">
                    <div style="font-weight:500; margin-bottom:8px;">联系人</div>
                    <div id="contacts">加载中...</div>
                </div>
                <!-- 聊天窗口 -->
                <div class="chat-window">
                    <div class="chat-messages" id="chatMessages">
                        <div style="color:#999; text-align:center; padding:40px 0;">选择一位联系人开始聊天</div>
                    </div>
                    <div class="chat-input" id="chatInput" style="display:none;">
                        <textarea id="msgContent" rows="2" placeholder="输入消息..."></textarea>
                        <button id="sendBtn" class="btn-primary btn-sm">发送</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let currentContact = null;
        let allContacts = [];
        let allMessages = [];

        // 加载联系人（从收件箱中提取，按发件人分组，并取最新消息）
        async function loadContacts() {
            try {
                const res = await fetch('/api/inbox', { credentials: 'include' });
                if (res.status === 401) { window.location.href = '/login.html'; return; }
                const data = await res.json();
                const msgs = data.messages || [];
                // 按发件人分组
                const map = {};
                msgs.forEach(m => {
                    if (!map[m.fromUid]) {
                        map[m.fromUid] = { uid: m.fromUid, lastMsg: m.content, lastTime: m.sentAt, unread: !m.read };
                    } else {
                        if (m.sentAt > map[m.fromUid].lastTime) {
                            map[m.fromUid].lastMsg = m.content;
                            map[m.fromUid].lastTime = m.sentAt;
                        }
                        if (!m.read) map[m.fromUid].unread = true;
                    }
                });
                allContacts = Object.values(map).sort((a,b) => b.lastTime - a.lastTime);
                renderContacts();
                // 如果有联系人，默认选中第一个
                if (allContacts.length > 0) {
                    selectContact(allContacts[0].uid);
                }
            } catch (err) {
                document.getElementById('contacts').innerHTML = '<div style="color:red;">加载失败</div>';
            }
        }

        function renderContacts() {
            const container = document.getElementById('contacts');
            if (allContacts.length === 0) {
                container.innerHTML = '<div style="color:#999;">暂无联系人</div>';
                return;
            }
            let html = '';
            allContacts.forEach(c => {
                const active = currentContact === c.uid ? 'active' : '';
                const unreadBadge = c.unread ? '<span style="background:#d9534f;color:#fff;border-radius:50%;padding:0px 6px;font-size:0.7rem;margin-left:auto;">●</span>' : '';
                html += `
                    <div class="contact-item ${active}" data-uid="${c.uid}">
                        <span>👤 ${c.uid}</span>
                        ${unreadBadge}
                    </div>
                `;
            });
            container.innerHTML = html;
            container.querySelectorAll('.contact-item').forEach(el => {
                el.addEventListener('click', function() {
                    selectContact(this.dataset.uid);
                });
            });
        }

        // 选择联系人，加载聊天记录
        async function selectContact(uid) {
            currentContact = uid;
            renderContacts();
            // 加载与该联系人的所有消息
            const res = await fetch('/api/inbox', { credentials: 'include' });
            const data = await res.json();
            const msgs = data.messages || [];
            const filtered = msgs.filter(m => m.fromUid === uid || (m.toUid === uid && m.fromUid === currentContact));
            // 按时间排序
            filtered.sort((a,b) => a.sentAt - b.sentAt);
            allMessages = filtered;
            renderMessages();
            document.getElementById('chatInput').style.display = 'flex';
            // 标记所有来自该联系人的未读消息为已读
            // 可以调用 markRead 批量，这里简单逐条
            for (let m of filtered) {
                if (!m.read && m.fromUid === uid) {
                    await fetch('/api/readMessage', { method: 'POST', credentials: 'include', body: new FormData().append('msgId', m.id) });
                }
            }
            // 刷新小红点
            updateBadge();
        }

        function renderMessages() {
            const container = document.getElementById('chatMessages');
            if (allMessages.length === 0) {
                container.innerHTML = '<div style="color:#999;text-align:center;padding:20px;">暂无消息</div>';
                return;
            }
            let html = '';
            allMessages.forEach(m => {
                const sent = m.fromUid === currentContact ? '' : 'sent';
                const time = new Date(m.sentAt).toLocaleString('zh-CN');
                html += `
                    <div class="chat-message ${sent}">
                        ${m.content}
                        <span class="time">${time}</span>
                    </div>
                `;
            });
            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
        }

        // 发送消息
        document.getElementById('sendBtn').addEventListener('click', async function() {
            const content = document.getElementById('msgContent').value.trim();
            if (!content || !currentContact) return;
            const fd = new FormData();
            fd.append('toUid', currentContact);
            fd.append('content', content);
            try {
                const res = await fetch('/api/sendMessage', { method: 'POST', credentials: 'include', body: fd });
                const result = await res.json();
                if (result.success) {
                    document.getElementById('msgContent').value = '';
                    // 重新加载消息
                    selectContact(currentContact);
                } else {
                    alert(result.error);
                }
            } catch (err) { alert('网络错误'); }
        });

        // 未读小红点
        async function updateBadge() {
            try {
                const res = await fetch('/api/inbox', { credentials: 'include' });
                if (res.status === 200) {
                    const data = await res.json();
                    const unread = data.messages ? data.messages.filter(m => !m.read).length : 0;
                    // 更新导航栏badge
                    const badge = document.querySelector('.sidebar-nav .badge');
                    if (badge) {
                        if (unread > 0) { badge.textContent = unread; badge.style.display = 'inline-block'; }
                        else { badge.style.display = 'none'; }
                    }
                }
            } catch (e) {}
        }

        loadContacts();
    </script>
</body>
</html>
