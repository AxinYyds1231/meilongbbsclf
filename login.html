<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>梅陇中学论坛 - 登录</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <h1>🔐 梅陇中学论坛</h1>
        <h2>用户登录</h2>
        <div id="error" class="error" style="display:none;"></div>
        <form id="loginForm">
            <input type="text" id="uid" placeholder="UID（如 ml20300323）" required>
            <input type="password" id="password" placeholder="密码" required>
            <button type="submit">登录</button>
        </form>
        <p>还没有账号？<a href="/register.html">立即注册</a></p>
        <p><a href="/adminLogin.html">管理员登录</a></p>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const uid = document.getElementById('uid').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('error');
            errorEl.style.display = 'none';

            const formData = new FormData();
            formData.append('uid', uid);
            formData.append('password', password);

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    credentials: 'include',   // ← 关键修改
                    body: formData
                });
                const result = await response.json();
                if (result.success) {
                    window.location.href = '/dashboard.html';
                } else {
                    errorEl.textContent = result.error || result.detail || '登录失败';
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                errorEl.textContent = '网络错误，请重试';
                errorEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>
