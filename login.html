<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>梅陇中学论坛 - 登录</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .forgot-link {
            display: inline-block;
            margin-top: 4px;
            font-size: 0.9rem;
            color: #1a3c6e;
            cursor: pointer;
        }
        .forgot-link:hover {
            text-decoration: underline;
        }
        /* 重置密码模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 999;
        }
        .modal-content {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(20px);
            padding: 28px 32px;
            border-radius: 28px;
            max-width: 400px;
            width: 90%;
            border: 1px solid rgba(255,255,255,0.6);
        }
        .modal-content h3 { margin-bottom: 16px; }
        .modal-content input {
            width: 100%;
            padding: 10px 14px;
            margin: 6px 0;
            border-radius: 14px;
            border: 1px solid rgba(0,0,0,0.06);
            background: rgba(255,255,255,0.6);
            font-size: 1rem;
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        .modal-actions button { flex: 1; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 420px; text-align: center;">
        <h1>🔐 梅陇中学论坛</h1>
        <h2 style="margin-bottom: 16px;">用户登录</h2>
        <div id="error" class="error" style="display:none;"></div>
        <form id="loginForm">
            <div class="form-group">
                <label>UID</label>
                <input type="text" id="uid" placeholder="如 ml20300101" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="密码" required>
            </div>
            <button type="submit" class="btn-primary" style="width:100%;">登录</button>
            <div style="text-align:left; margin-top:6px;">
                <span class="forgot-link" onclick="openResetModal()">🔑 忘记密码？</span>
            </div>
        </form>
        <p style="margin-top:16px;">还没有账号？<a href="/register.html">立即注册</a></p>
        <p><a href="/adminLogin.html">管理员登录</a></p>
    </div>

    <!-- 重置密码模态框 -->
    <div id="resetModal" class="modal">
        <div class="modal-content">
            <h3>🔑 重置密码</h3>
            <p style="font-size:0.9rem; color:#6b7a8a; margin-bottom:12px;">输入你的 UID 和新密码</p>
            <input type="text" id="resetUid" placeholder="你的 UID">
            <input type="password" id="resetNewPassword" placeholder="新密码（≥8位）">
            <input type="password" id="resetConfirmPassword" placeholder="确认新密码">
            <div class="modal-actions">
                <button id="resetBtn" class="btn-primary">重置</button>
                <button onclick="closeResetModal()" class="btn-secondary">取消</button>
            </div>
            <div id="resetError" class="error" style="display:none; margin-top:10px;"></div>
            <div id="resetSuccess" class="success" style="display:none; margin-top:10px;"></div>
        </div>
    </div>

    <script>
        // ---------- 登录 ----------
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const uid = document.getElementById('uid').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorEl = document.getElementById('error');
            errorEl.style.display = 'none';

            if (!uid || !password) {
                errorEl.textContent = '请填写完整信息';
                errorEl.style.display = 'block';
                return;
            }

            const fd = new FormData();
            fd.append('uid', uid);
            fd.append('password', password);

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    credentials: 'include',
                    body: fd
                });
                const result = await res.json();
                if (result.success) {
                    window.location.href = '/index.html';
                } else {
                    errorEl.textContent = result.error || '登录失败';
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                errorEl.textContent = '网络错误，请重试';
                errorEl.style.display = 'block';
            }
        });

        // ---------- 重置密码 ----------
        function openResetModal() {
            document.getElementById('resetModal').style.display = 'flex';
            document.getElementById('resetError').style.display = 'none';
            document.getElementById('resetSuccess').style.display = 'none';
            document.getElementById('resetUid').value = '';
            document.getElementById('resetNewPassword').value = '';
            document.getElementById('resetConfirmPassword').value = '';
        }
        function closeResetModal() {
            document.getElementById('resetModal').style.display = 'none';
        }
        document.getElementById('resetModal').addEventListener('click', function(e) {
            if (e.target === this) closeResetModal();
        });

        document.getElementById('resetBtn').addEventListener('click', async function() {
            const uid = document.getElementById('resetUid').value.trim();
            const newPassword = document.getElementById('resetNewPassword').value.trim();
            const confirmPassword = document.getElementById('resetConfirmPassword').value.trim();
            const errorEl = document.getElementById('resetError');
            const successEl = document.getElementById('resetSuccess');
            errorEl.style.display = 'none';
            successEl.style.display = 'none';

            if (!uid || !newPassword || !confirmPassword) {
                errorEl.textContent = '请填写完整信息';
                errorEl.style.display = 'block';
                return;
            }
            if (newPassword !== confirmPassword) {
                errorEl.textContent = '两次密码输入不一致';
                errorEl.style.display = 'block';
                return;
            }
            if (newPassword.length < 8) {
                errorEl.textContent = '密码至少8位';
                errorEl.style.display = 'block';
                return;
            }

            const fd = new FormData();
            fd.append('uid', uid);
            fd.append('newPassword', newPassword);
            fd.append('confirmPassword', confirmPassword);

            try {
                const res = await fetch('/api/resetPassword', {
                    method: 'POST',
                    credentials: 'include',
                    body: fd
                });
                const result = await res.json();
                if (result.success) {
                    successEl.textContent = '✅ 密码已重置！请用新密码登录';
                    successEl.style.display = 'block';
                    setTimeout(() => {
                        closeResetModal();
                        document.getElementById('uid').value = uid;
                        document.getElementById('password').value = '';
                    }, 2000);
                } else {
                    errorEl.textContent = result.error || '重置失败';
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                errorEl.textContent = '网络错误，请重试';
                errorEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>
