<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>修改个人信息</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .nav-links { margin-bottom: 16px; display: flex; gap: 15px; }
        .nav-links a { color: #1a3c6e; text-decoration: none; }
        .nav-links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 400px;">
        <div class="nav-links">
            <a href="/index.html">🏠 首页</a>
            <a href="/dashboard.html">👤 个人中心</a>
        </div>
        <h1>✏️ 修改个人信息</h1>
        <div id="error" class="error" style="display:none;"></div>
        <div id="success" class="success" style="display:none;"></div>
        <form id="updateForm">
            <input type="text" id="name" placeholder="姓名" required>
            <select id="gender" required>
                <option value="">选择性别</option>
                <option value="男">男</option>
                <option value="女">女</option>
            </select>
            <select id="grade" required>
                <option value="">选择年级</option>
                <option value="6">六年级</option>
                <option value="7">七年级</option>
                <option value="8">八年级</option>
                <option value="9">九年级</option>
            </select>
            <select id="class" required>
                <option value="">选择班级</option>
                <option value="1">1班</option><option value="2">2班</option>
                <option value="3">3班</option><option value="4">4班</option>
                <option value="5">5班</option><option value="6">6班</option>
                <option value="7">7班</option><option value="8">8班</option>
                <option value="9">9班</option><option value="10">10班</option>
                <option value="11">11班</option><option value="12">12班</option>
                <option value="13">13班</option>
            </select>
            <button type="submit">保存修改</button>
        </form>
        <p><a href="/dashboard.html">返回个人中心</a></p>
    </div>

    <script>
        // 加载当前用户信息
        async function loadUser() {
            try {
                const res = await fetch('/api/user', { credentials: 'include' });
                if (res.status === 401) {
                    window.location.href = '/login.html';
                    return;
                }
                const data = await res.json();
                const user = data.user;
                document.getElementById('name').value = user.name || '';
                document.getElementById('gender').value = user.gender || '';
                // grade, class 需要从数据库加载，这里暂不处理，后续改进
                // 我们可以再调用一个接口获取完整信息，但为了简化，先这样
            } catch (err) {
                console.error(err);
            }
        }

        document.getElementById('updateForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const name = document.getElementById('name').value.trim();
            const gender = document.getElementById('gender').value;
            const grade = document.getElementById('grade').value;
            const cls = document.getElementById('class').value;
            const errorEl = document.getElementById('error');
            const successEl = document.getElementById('success');
            errorEl.style.display = 'none';
            successEl.style.display = 'none';

            if (!name || !gender || !grade || !cls) {
                errorEl.textContent = '请填写完整信息';
                errorEl.style.display = 'block';
                return;
            }

            const formData = new FormData();
            formData.append('name', name);
            formData.append('gender', gender);
            formData.append('grade', grade);
            formData.append('class', cls);

            try {
                const res = await fetch('/api/updateUser', {
                    method: 'POST',
                    credentials: 'include',
                    body: formData
                });
                const result = await res.json();
                if (result.success) {
                    successEl.textContent = '修改成功！';
                    successEl.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = '/dashboard.html';
                    }, 1500);
                } else {
                    errorEl.textContent = result.error || '修改失败';
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                errorEl.textContent = '网络错误，请重试';
                errorEl.style.display = 'block';
            }
        });

        loadUser();
    </script>
</body>
</html>
