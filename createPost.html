<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布新帖子</title>
    <link rel="stylesheet" href="/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .preview-box { border: 1px solid #ddd; padding: 12px; border-radius: 6px; background: #fafafa; margin-top: 8px; min-height: 60px; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 600px;">
        <div class="nav-links">
            <a href="/index.html">🏠 首页</a>
            <a href="/dashboard.html">👤 个人中心</a>
        </div>
        <h1>📝 发布新帖子</h1>
        <div id="error" class="error" style="display:none;"></div>
        <form id="createForm">
            <div class="form-group">
                <label>分类</label>
                <select id="categoryId" required><option value="">选择分类</option></select>
            </div>
            <div class="form-group">
                <label>标题</label>
                <input type="text" id="title" placeholder="输入标题..." required>
            </div>
            <div class="form-group">
                <label>内容 (支持Markdown, 最多1000字)</label>
                <textarea id="content" rows="6" placeholder="写正文..." maxlength="1000" required></textarea>
                <div class="char-counter"><span id="charCount">0</span>/1000</div>
                <div class="preview-box" id="preview">预览区域</div>
            </div>
            <div class="form-group">
                <label>附件 (可选, ≤2MB/个, 最多2个)</label>
                <input type="file" id="fileInput" multiple accept=".txt,.zip,.rar,.pdf,.doc,.docx,.png,.jpg,.jpeg,.gif,.bmp">
                <div id="fileList" class="file-list"></div>
            </div>
            <button type="submit" class="btn-primary">发布</button>
            <button type="button" onclick="history.back()" style="margin-left:10px;">取消</button>
        </form>
    </div>

    <script>
        let selectedFiles = [];

        // 实时预览
        document.getElementById('content').addEventListener('input', function() {
            document.getElementById('charCount').textContent = this.value.length;
            document.getElementById('preview').innerHTML = marked.parse(this.value || '预览区域');
        });

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const files = Array.from(e.target.files);
            if (selectedFiles.length + files.length > 2) { alert('最多2个附件'); this.value=''; return; }
            const MAX_SIZE = 2*1024*1024;
            for (let f of files) {
                if (f.size > MAX_SIZE) { alert(`文件 ${f.name} 超过2MB`); this.value=''; return; }
            }
            selectedFiles = selectedFiles.concat(files);
            renderFileList();
            this.value = '';
        });

        function renderFileList() {
            const container = document.getElementById('fileList');
            if (selectedFiles.length === 0) { container.innerHTML=''; return; }
            let html = '';
            selectedFiles.forEach((f,i) => {
                html += `<span class="file-item">${f.name} (${(f.size/1024).toFixed(1)}KB) <button onclick="removeFile(${i})">×</button></span>`;
            });
            container.innerHTML = html;
        }
        function removeFile(i) { selectedFiles.splice(i,1); renderFileList(); }

        // 加载分类
        async function loadCategories() {
            try {
                const res = await fetch('/api/categories');
                const data = await res.json();
                const select = document.getElementById('categoryId');
                data.categories.forEach(cat => {
                    const opt = document.createElement('option');
                    opt.value = cat.id;
                    opt.textContent = cat.name;
                    select.appendChild(opt);
                });
            } catch (err) { console.error(err); }
        }

        document.getElementById('createForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const title = document.getElementById('title').value.trim();
            const content = document.getElementById('content').value.trim();
            const categoryId = document.getElementById('categoryId').value;
            if (!title || !content) { alert('标题和内容都不能为空'); return; }
            if (content.length > 1000) { alert('内容超过1000字限制'); return; }
            if (!categoryId) { alert('请选择分类'); return; }

            // 上传附件
            let attachments = [];
            for (let f of selectedFiles) {
                const fd = new FormData();
                fd.append('file', f);
                try {
                    const res = await fetch('/api/uploadFile', { method: 'POST', credentials: 'include', body: fd });
                    const result = await res.json();
                    if (result.success) attachments.push(result.attachment);
                    else { alert(`文件 ${f.name} 上传失败`); return; }
                } catch (err) { alert('附件上传失败'); return; }
            }

            const postFd = new FormData();
            postFd.append('title', title);
            postFd.append('content', content);
            postFd.append('categoryId', categoryId);
            postFd.append('attachments', JSON.stringify(attachments));

            try {
                const res = await fetch('/api/createPost', { method: 'POST', credentials: 'include', body: postFd });
                const result = await res.json();
                if (result.success) { alert('发布成功！'); window.location.href = '/index.html'; }
                else alert(result.error);
            } catch (err) { alert('网络错误'); }
        });

        loadCategories();
    </script>
</body>
</html>
