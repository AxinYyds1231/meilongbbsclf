<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>发布新帖子</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 4px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .form-group textarea { resize: vertical; }
        .file-list { margin-top: 8px; }
        .file-item { background: #f4f4f4; padding: 4px 8px; border-radius: 4px; display: inline-block; margin-right: 6px; margin-bottom: 4px; }
        .char-counter { font-size: 0.85em; color: #888; text-align: right; }
        .nav-links { margin-bottom: 16px; display: flex; gap: 15px; flex-wrap: wrap; }
        .nav-links a { color: #1a3c6e; text-decoration: none; }
        .nav-links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 600px;">
        <div class="nav-links">
            <a href="/index.html">🏠 首页</a>
            <a href="/dashboard.html">👤 个人中心</a>
        </div>
        <h1>📝 发布新帖子</h1>
        <div id="error" class="error" style="display:none;"></div>
        <form id="createForm">
            <div class="form-group">
                <label>分类</label>
                <select id="categoryId" required>
                    <option value="">选择分类</option>
                </select>
            </div>
            <div class="form-group">
                <label>标题</label>
                <input type="text" id="title" placeholder="输入标题..." required>
            </div>
            <div class="form-group">
                <label>内容 (最多1000字)</label>
                <textarea id="content" rows="8" placeholder="写正文..." maxlength="1000" required></textarea>
                <div class="char-counter"><span id="charCount">0</span>/1000</div>
            </div>
            <div class="form-group">
                <label>附件 (可选, 每个文件不超过2MB)</label>
                <input type="file" id="fileInput" multiple accept=".txt,.zip,.rar,.pdf,.doc,.docx,.png,.jpg,.jpeg,.gif,.bmp">
                <div id="fileList" class="file-list"></div>
            </div>
            <button type="submit" class="btn-primary">发布</button>
            <button type="button" onclick="history.back()" style="margin-left:10px;">取消</button>
        </form>
    </div>

    <script>
        let selectedFiles = [];

        document.getElementById('content').addEventListener('input', function() {
            document.getElementById('charCount').textContent = this.value.length;
        });

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const files = Array.from(e.target.files);
            if (selectedFiles.length + files.length > 2) {
                alert('最多只能上传2个附件');
                this.value = '';
                return;
            }
            const MAX_SIZE = 2 * 1024 * 1024;
            for (let f of files) {
                if (f.size > MAX_SIZE) {
                    alert(`文件 ${f.name} 超过2MB限制`);
                    this.value = '';
                    return;
                }
            }
            selectedFiles = selectedFiles.concat(files);
            renderFileList();
            this.value = '';
        });

        function renderFileList() {
            const container = document.getElementById('fileList');
            if (selectedFiles.length === 0) {
                container.innerHTML = '';
                return;
            }
            let html = '';
            selectedFiles.forEach((f, index) => {
                html += `<span class="file-item">${f.name} (${(f.size/1024).toFixed(1)}KB) <button onclick="removeFile(${index})">×</button></span>`;
            });
            container.innerHTML = html;
        }

        function removeFile(index) {
            selectedFiles.splice(index, 1);
            renderFileList();
        }

        // 加载分类
        async function loadCategories() {
            try {
                const res = await fetch('/api/categories');
                const data = await res.json();
                const select = document.getElementById('categoryId');
                data.categories.forEach(cat => {
                    const opt = document.createElement('option');
                    opt.value = cat.id;
                    opt.textContent = cat.name;
                    select.appendChild(opt);
                });
            } catch (err) {
                console.error('加载分类失败', err);
            }
        }

        document.getElementById('createForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const title = document.getElementById('title').value.trim();
            const content = document.getElementById('content').value.trim();
            const categoryId = document.getElementById('categoryId').value;
            if (!title || !content) {
                alert('标题和内容都不能为空');
                return;
            }
            if (content.length > 1000) {
                alert('内容超过1000字限制');
                return;
            }
            if (!categoryId) {
                alert('请选择分类');
                return;
            }

            // 上传附件
            let attachments = [];
            for (let f of selectedFiles) {
                const formData = new FormData();
                formData.append('file', f);
                try {
                    const res = await fetch('/api/uploadFile', {
                        method: 'POST',
                        credentials: 'include',
                        body: formData
                    });
                    const result = await res.json();
                    if (result.success) {
                        attachments.push(result.attachment);
                    } else {
                        alert(`文件 ${f.name} 上传失败: ${result.error}`);
                        return;
                    }
                } catch (err) {
                    alert('网络错误，上传附件失败');
                    return;
                }
            }

            const postFormData = new FormData();
            postFormData.append('title', title);
            postFormData.append('content', content);
            postFormData.append('categoryId', categoryId);
            postFormData.append('attachments', JSON.stringify(attachments));

            try {
                const res = await fetch('/api/createPost', {
                    method: 'POST',
                    credentials: 'include',
                    body: postFormData
                });
                const result = await res.json();
                if (result.success) {
                    alert('发布成功！');
                    window.location.href = '/index.html';
                } else {
                    alert(result.error || '发布失败');
                }
            } catch (err) {
                alert('网络错误，请重试');
            }
        });

        loadCategories();
    </script>
</body>
</html>
