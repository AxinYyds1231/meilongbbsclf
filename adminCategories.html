<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分类管理</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .category-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(4px);
            padding: 8px 14px;
            border-radius: 10px;
            margin-bottom: 6px;
            border: 1px solid rgba(255,255,255,0.3);
            transition: 0.2s;
        }
        .category-item:hover {
            background: rgba(255,255,255,0.6);
        }
        .category-name {
            font-weight: 500;
            color: #1a2332;
        }
        .category-desc {
            font-size: 0.85rem;
            color: #6b7a8a;
            margin-left: 12px;
        }
        .category-actions button {
            margin-left: 6px;
        }
        .edit-btn, .delete-btn {
            border: none;
            padding: 2px 12px;
            border-radius: 16px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
        }
        .edit-btn {
            background: rgba(26,60,110,0.1);
            color: #1a3c6e;
        }
        .edit-btn:hover {
            background: #1a3c6e;
            color: #fff;
        }
        .delete-btn {
            background: rgba(217,83,79,0.1);
            color: #d9534f;
        }
        .delete-btn:hover {
            background: #d9534f;
            color: #fff;
        }
        .tree-indent {
            display: inline-block;
            width: 20px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 999;
        }
        .modal-content {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(20px);
            padding: 24px;
            border-radius: 24px;
            max-width: 450px;
            width: 90%;
        }
        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%;
            margin: 6px 0;
            padding: 8px 12px;
            border-radius: 12px;
            border: 1px solid rgba(0,0,0,0.06);
            background: rgba(255,255,255,0.5);
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        .modal-actions button { flex: 1; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 700px;">
        <div class="nav-links">
            <a href="/index.html">🏠 首页</a>
            <a href="/adminDashboard.html">🔙 管理后台</a>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap;">
            <h1>📂 分类管理</h1>
            <button id="addCategoryBtn" class="btn-primary">➕ 新建</button>
        </div>
        <div id="categoryList">加载中...</div>
        <a href="/adminDashboard.html" style="display:inline-block; margin-top:16px;">← 返回管理后台</a>
    </div>

    <!-- 新建/编辑模态框 -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">新建分类</h3>
            <input type="hidden" id="editId">
            <input type="text" id="editName" placeholder="分类名称" required>
            <textarea id="editDesc" rows="2" placeholder="描述（可选）"></textarea>
            <select id="editParent">
                <option value="0">（顶级分类）</option>
            </select>
            <div class="modal-actions">
                <button id="saveBtn" class="btn-primary">保存</button>
                <button onclick="closeModal()" class="btn-secondary">取消</button>
            </div>
        </div>
    </div>

    <script>
        // 获取分类树
        async function getCategoryTree() {
            const res = await fetch('/api/categories');
            const data = await res.json();
            return data.categories || [];
        }

        // 渲染分类列表（递归）
        function renderCategories(tree, container, level = 0) {
            if (!tree || tree.length === 0) {
                container.innerHTML = '<div style="color:#999; text-align:center; padding:20px;">暂无分类</div>';
                return;
            }
            let html = '';
            tree.forEach(node => {
                const indent = '　'.repeat(level);
                html += `
                    <div class="category-item">
                        <div>
                            <span class="category-name">${indent}${node.name}</span>
                            <span class="category-desc">${node.description || ''}</span>
                        </div>
                        <div class="category-actions">
                            <button class="edit-btn" data-id="${node.id}" data-name="${node.name}" data-desc="${node.description || ''}" data-parent="${node.parentId || 0}">编辑</button>
                            <button class="delete-btn" data-id="${node.id}">删除</button>
                        </div>
                    </div>
                `;
                if (node.children && node.children.length > 0) {
                    // 递归渲染子分类（这里我们直接追加到当前容器，但为了保持顺序，可以递归调用但传入子容器，这里简化：直接用字符串拼接）
                    // 为了简单，我们不使用递归渲染，而是将子分类放在当前项下面，但需要额外的容器，这里采用直接拼接方式
                    // 但更好是用递归函数，我们将子分类放入一个子容器。
                    // 为了方便，我换一种方式：先收集所有分类，然后根据层级缩进。
                }
            });
            // 由于上面的递归方式太复杂，改用平铺方式
            // 我们换一种更简单的方式：将树形结构压平，显示时加缩进。
            // 但为了便于删除和编辑，我们需要保持结构清晰。
            // 我决定重新实现：获取所有分类的扁平列表，然后根据parentId生成树，再渲染。
            // 但由于我们已经有了树形数据，我们可以直接在JS中递归生成HTML。
            // 重新写一个递归生成函数。
        }

        // 重新实现：使用递归生成HTML字符串
        function buildTreeHTML(nodes, level = 0) {
            let html = '';
            nodes.forEach(node => {
                const indent = '　'.repeat(level);
                html += `
                    <div class="category-item">
                        <div>
                            <span class="category-name">${indent}${node.name}</span>
                            <span class="category-desc">${node.description || ''}</span>
                        </div>
                        <div class="category-actions">
                            <button class="edit-btn" data-id="${node.id}" data-name="${node.name}" data-desc="${node.description || ''}" data-parent="${node.parentId || 0}">编辑</button>
                            <button class="delete-btn" data-id="${node.id}">删除</button>
                        </div>
                    </div>
                `;
                if (node.children && node.children.length > 0) {
                    html += buildTreeHTML(node.children, level + 1);
                }
            });
            return html;
        }

        // 加载分类并渲染
        async function loadCategories() {
            try {
                const tree = await getCategoryTree();
                const container = document.getElementById('categoryList');
                if (!tree || tree.length === 0) {
                    container.innerHTML = '<div style="color:#999; text-align:center; padding:20px;">暂无分类</div>';
                    return;
                }
                const html = buildTreeHTML(tree);
                container.innerHTML = html;

                // 绑定编辑按钮
                document.querySelectorAll('.edit-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const id = parseInt(this.dataset.id);
                        const name = this.dataset.name;
                        const desc = this.dataset.desc;
                        const parent = parseInt(this.dataset.parent);
                        openEditModal(id, name, desc, parent);
                    });
                });

                // 绑定删除按钮
                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', async function() {
                        const id = parseInt(this.dataset.id);
                        if (!confirm('确定删除此分类？删除前请确保没有子分类。')) return;
                        try {
                            const fd = new FormData();
                            fd.append('id', id);
                            const res = await fetch('/api/adminDeleteCategory', {
                                method: 'POST',
                                credentials: 'include',
                                body: fd
                            });
                            const result = await res.json();
                            if (result.success) {
                                alert('已删除');
                                loadCategories();
                            } else {
                                alert(result.error || '删除失败');
                            }
                        } catch (err) {
                            alert('网络错误');
                        }
                    });
                });
            } catch (err) {
                document.getElementById('categoryList').innerHTML = '<div style="color:red;">加载失败</div>';
            }
        }

        // 填充父分类下拉（递归展平）
        function populateParentSelect(tree, select, excludeId = 0, prefix = '') {
            tree.forEach(node => {
                if (node.id === excludeId) return; // 不能选择自身
                const opt = document.createElement('option');
                opt.value = node.id;
                opt.textContent = prefix + node.name;
                select.appendChild(opt);
                if (node.children && node.children.length > 0) {
                    populateParentSelect(node.children, select, excludeId, prefix + '—— ');
                }
            });
        }

        // 打开编辑/新建模态框
        async function openEditModal(id = null, name = '', desc = '', parent = 0) {
            const modal = document.getElementById('editModal');
            document.getElementById('editId').value = id || '';
            document.getElementById('editName').value = name;
            document.getElementById('editDesc').value = desc;
            document.getElementById('modalTitle').textContent = id ? '编辑分类' : '新建分类';

            // 刷新父分类下拉
            const select = document.getElementById('editParent');
            select.innerHTML = '<option value="0">（顶级分类）</option>';
            const tree = await getCategoryTree();
            populateParentSelect(tree, select, id || 0);

            // 设置当前父分类
            if (parent) {
                select.value = parent;
            }

            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
        }
        document.getElementById('editModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        document.getElementById('addCategoryBtn').addEventListener('click', () => openEditModal());

        document.getElementById('saveBtn').addEventListener('click', async function() {
            const id = document.getElementById('editId').value;
            const name = document.getElementById('editName').value.trim();
            const description = document.getElementById('editDesc').value.trim();
            const parentId = parseInt(document.getElementById('editParent').value) || 0;

            if (!name) {
                alert('请输入分类名称');
                return;
            }

            const endpoint = id ? '/api/adminUpdateCategory' : '/api/adminCreateCategory';
            const fd = new FormData();
            if (id) fd.append('id', id);
            fd.append('name', name);
            fd.append('description', description);
            fd.append('parentId', parentId);

            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    credentials: 'include',
                    body: fd
                });
                const result = await res.json();
                if (result.success) {
                    alert(id ? '更新成功' : '创建成功');
                    closeModal();
                    loadCategories();
                } else {
                    alert(result.error || '操作失败');
                }
            } catch (err) {
                alert('网络错误');
            }
        });

        // 初始加载
        loadCategories();
    </script>
</body>
</html>
