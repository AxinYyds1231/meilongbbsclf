<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帖子详情</title>
    <link rel="stylesheet" href="/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .post-detail { background: rgba(255,255,255,0.4); backdrop-filter: blur(4px); border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.5); }
        .post-title { font-size: 1.6rem; font-weight: 700; color: #1a2332; }
        .post-meta { color: #6b7a8a; font-size: 0.9rem; margin: 8px 0; }
        .post-content { margin: 16px 0; line-height: 1.8; }
        .post-content img { max-width: 100%; border-radius: 12px; }
        .post-content pre { background: rgba(0,0,0,0.06); padding: 12px; border-radius: 12px; overflow-x: auto; }
        .post-content code { background: rgba(0,0,0,0.04); padding: 2px 6px; border-radius: 6px; font-size: 0.9em; }
        .post-content blockquote { border-left: 4px solid #1a3c6e; padding-left: 16px; color: #3a4a5a; }
        .reply-item { background: rgba(255,255,255,0.3); backdrop-filter: blur(4px); padding: 14px 16px; border-radius: 16px; margin-bottom: 10px; border-left: 4px solid #1a3c6e; }
        .reply-meta { font-size: 0.85rem; color: #6b7a8a; }
        .reply-content { margin-top: 4px; }
        .reply-actions { margin-top: 6px; }
        .btn-danger { background: #d9534f; color: #fff; border: none; padding: 6px 16px; border-radius: 30px; cursor: pointer; transition: 0.2s; }
        .btn-danger:hover { background: #c9302c; }
        .btn-secondary { background: rgba(0,0,0,0.06); color: #1a2332; border: 1px solid rgba(0,0,0,0.08); padding: 6px 16px; border-radius: 30px; cursor: pointer; }
        .btn-secondary:hover { background: rgba(0,0,0,0.1); }
        .vote-btn { background: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.8); padding: 4px 14px; border-radius: 30px; cursor: pointer; margin-right: 6px; transition: 0.2s; }
        .vote-btn:hover { background: rgba(255,255,255,0.9); }
        .deleted-banner { background: rgba(217,83,79,0.12); padding: 12px 16px; border-radius: 16px; margin-bottom: 16px; border-left: 4px solid #d9534f; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 720px;">
        <div class="nav-links">
            <a href="/index.html">🏠 首页</a>
            <a href="/dashboard.html">👤 个人中心</a>
            <a href="/inbox.html">📩 私信</a>
            <a href="/adminLogin.html">🔑 管理</a>
        </div>
        <div id="postContainer">加载中...</div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');

        // ---------- 加载帖子 ----------
        async function loadPost() {
            if (!postId) {
                document.getElementById('postContainer').innerHTML = '<div style="color:red;">缺少帖子ID</div>';
                return;
            }
            try {
                const res = await fetch(`/api/post?id=${postId}`);
                if (res.status === 404) {
                    document.getElementById('postContainer').innerHTML = '<div style="color:red;">帖子不存在</div>';
                    return;
                }
                if (res.status === 410) {
                    const data = await res.json();
                    document.getElementById('postContainer').innerHTML = `
                        <div class="deleted-banner">❌ 该帖子已被删除</div>
                        <p>原因：${data.deleteReason || '未提供'}</p>
                        <a href="/index.html">返回首页</a>
                    `;
                    return;
                }
                const data = await res.json();
                const post = data.post;
                const time = new Date(post.createdAt).toLocaleString('zh-CN');

                // 获取当前用户
                const userRes = await fetch('/api/user', { credentials: 'include' });
                let currentUser = null;
                if (userRes.status === 200) {
                    currentUser = (await userRes.json()).user;
                }

                // 检查管理员
                let isAdmin = false;
                try {
                    const adminRes = await fetch('/api/adminDashboard', { credentials: 'include' });
                    if (adminRes.status === 200) isAdmin = true;
                } catch (e) {}

                // 删除按钮
                let deleteBtnHtml = '';
                if (currentUser && currentUser.uid === post.authorUid) {
                    deleteBtnHtml += `<button id="deleteMyPostBtn" class="btn-danger" style="margin-top:10px;">🗑️ 删除我的帖子</button>`;
                }
                if (isAdmin) {
                    deleteBtnHtml += `<button id="deletePostBtn" class="btn-danger" style="margin-top:10px; margin-left:8px;">🔧 管理删除</button>`;
                }

                // 附件
                let attachmentsHtml = '';
                if (post.attachments && post.attachments.length > 0) {
                    attachmentsHtml = '<div><strong>📎 附件：</strong>';
                    post.attachments.forEach(att => {
                        const dataUri = `data:${att.type};base64,${att.data}`;
                        attachmentsHtml += `<a href="${dataUri}" download="${att.name}" class="attachment-link">${att.name}</a> (${(att.size/1024).toFixed(1)}KB)`;
                    });
                    attachmentsHtml += '</div>';
                }

                // 渲染主内容
                const contentHtml = marked.parse(post.content);

                let html = `
                    <div class="post-detail">
                        <div class="post-title">${post.title}</div>
                        <div class="post-meta">
                            📂 ${post.categoryName || '未分类'} &nbsp;
                            ✍️ <a href="/profile.html?uid=${post.authorUid}">${post.authorName}</a>
                            &nbsp; 🕒 ${time}
                            &nbsp; 👍 ${post.likesCount} &nbsp; 👎 ${post.dislikesCount}
                        </div>
                        <div class="post-content">${contentHtml}</div>
                        ${attachmentsHtml}
                        <div style="margin-top:8px;">
                            <button class="vote-btn" data-target="post" data-type="like">👍 ${post.likesCount}</button>
                            <button class="vote-btn" data-target="post" data-type="dislike">👎 ${post.dislikesCount}</button>
                            ${deleteBtnHtml}
                        </div>
                    </div>
                    <h3>💬 全部回复 (${post.replies.length})</h3>
                    <div id="replies">
                `;

                if (post.replies.length === 0) {
                    html += '<div style="color:#999;">还没有回复</div>';
                } else {
                    post.replies.forEach((r, idx) => {
                        const rt = new Date(r.createdAt).toLocaleString('zh-CN');
                        const replyContent = marked.parse(r.content);
                        html += `
                            <div class="reply-item">
                                <div class="reply-meta">${r.name} · ${rt}</div>
                                <div class="reply-content">${replyContent}</div>
                                <div class="reply-actions">
                                    <button class="vote-btn" data-target="reply" data-postid="${postId}" data-replyindex="${idx}" data-type="like">👍 ${r.likesCount}</button>
                                    <button class="vote-btn" data-target="reply" data-postid="${postId}" data-replyindex="${idx}" data-type="dislike">👎 ${r.dislikesCount}</button>
                                </div>
                            </div>
                        `;
                    });
                }

                html += `
                    </div>
                    <div class="reply-form" style="margin-top:20px;">
                        <textarea id="replyContent" rows="3" placeholder="回复内容... (支持Markdown)"></textarea>
                        <button id="replyBtn" class="btn-primary" style="margin-top:6px;">提交回复</button>
                    </div>
                `;

                document.getElementById('postContainer').innerHTML = html;

                // ---------- 绑定投票 ----------
                document.querySelectorAll('.vote-btn').forEach(btn => {
                    btn.addEventListener('click', async function() {
                        const target = this.dataset.target;
                        const type = this.dataset.type;
                        const pid = this.dataset.postid || postId;
                        const replyIndex = this.dataset.replyindex || null;
                        const fd = new FormData();
                        fd.append('target', target);
                        fd.append('postId', pid);
                        fd.append('type', type);
                        if (replyIndex !== null) fd.append('replyIndex', replyIndex);
                        try {
                            const res = await fetch('/api/like', { method: 'POST', credentials: 'include', body: fd });
                            const result = await res.json();
                            if (result.success) {
                                loadPost();
                            } else {
                                alert(result.error || '操作失败');
                            }
                        } catch (err) { alert('网络错误'); }
                    });
                });

                // ---------- 回复 ----------
                document.getElementById('replyBtn').addEventListener('click', async function() {
                    const content = document.getElementById('replyContent').value.trim();
                    if (!content) { alert('请输入回复内容'); return; }
                    const fd = new FormData();
                    fd.append('postId', postId);
                    fd.append('content', content);
                    try {
                        const res = await fetch('/api/reply', { method: 'POST', credentials: 'include', body: fd });
                        const result = await res.json();
                        if (result.success) { alert('回复成功'); loadPost(); }
                        else alert(result.error);
                    } catch (err) { alert('网络错误'); }
                });

                // ---------- 用户自删 ----------
                if (document.getElementById('deleteMyPostBtn')) {
                    document.getElementById('deleteMyPostBtn').addEventListener('click', async function() {
                        if (!confirm('确定要删除此帖子吗？删除后不可恢复！')) return;
                        try {
                            const fd = new FormData();
                            fd.append('postId', postId);
                            const res = await fetch('/api/deleteMyPost', { method: 'POST', credentials: 'include', body: fd });
                            const result = await res.json();
                            if (result.success) { alert('已删除'); window.location.href = '/index.html'; }
                            else alert(result.error || '删除失败');
                        } catch (err) { alert('网络错误'); }
                    });
                }

                // ---------- 管理删除 ----------
                if (document.getElementById('deletePostBtn')) {
                    document.getElementById('deletePostBtn').addEventListener('click', function() {
                        if (!confirm('确定删除？')) return;
                        const reason = prompt('请输入删除原因：');
                        if (reason && reason.trim()) {
                            const fd = new FormData();
                            fd.append('postId', postId);
                            fd.append('reason', reason);
                            fetch('/api/adminDeletePostWithReason', { method: 'POST', credentials: 'include', body: fd })
                                .then(r => r.json())
                                .then(res => {
                                    if (res.success) { alert('已删除'); window.location.href = '/index.html'; }
                                    else alert(res.error);
                                });
                        }
                    });
                }

            } catch (err) {
                document.getElementById('postContainer').innerHTML = '<div style="color:red;">加载失败</div>';
            }
        }

        loadPost();
    </script>
</body>
</html>
