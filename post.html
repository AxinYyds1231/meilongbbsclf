<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>帖子详情</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .post-detail { background: #f9f9f9; padding: 16px; border-radius: 6px; margin-bottom: 20px; }
        .post-title { font-size: 1.5em; font-weight: bold; color: #1a3c6e; }
        .post-meta { color: #666; font-size: 0.9em; margin: 8px 0; }
        .post-content { margin: 16px 0; line-height: 1.6; }
        .reply-item { background: #fff; padding: 10px 14px; border-radius: 4px; margin-bottom: 8px; border-left: 3px solid #1a3c6e; }
        .reply-meta { font-size: 0.85em; color: #888; }
        .reply-content { margin-top: 4px; }
        .reply-form { margin-top: 20px; }
        .reply-form textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; resize: vertical; }
        .reply-form button { margin-top: 6px; }
        .back-link { display: inline-block; margin-bottom: 16px; color: #1a3c6e; }
        .nav-links { margin-bottom: 16px; display: flex; gap: 15px; }
        .nav-links a { color: #1a3c6e; text-decoration: none; }
        .nav-links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 700px;">
        <div class="nav-links">
            <a href="/index.html">🏠 首页</a>
            <a href="/dashboard.html">👤 个人中心</a>
            <a href="/adminLogin.html">🔑 管理</a>
        </div>
        <div id="postContainer">加载中...</div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');

        async function loadPost() {
            if (!postId) {
                document.getElementById('postContainer').innerHTML = '<div style="color:red;">缺少帖子ID</div>';
                return;
            }
            try {
                const res = await fetch(`/api/post?id=${postId}`);
                if (res.status === 404) {
                    document.getElementById('postContainer').innerHTML = '<div style="color:red;">帖子不存在</div>';
                    return;
                }
                const data = await res.json();
                const post = data.post;
                const time = new Date(post.createdAt).toLocaleString('zh-CN');

                let html = `
                    <div class="post-detail">
                        <div class="post-title">${post.title}</div>
                        <div class="post-meta">✍️ ${post.authorName}  ·  🕒 ${time}</div>
                        <div class="post-content">${post.content.replace(/\n/g, '<br>')}</div>
                    </div>
                    <h3>💬 全部回复 (${post.replies.length})</h3>
                    <div id="replies">
                `;
                if (post.replies.length === 0) {
                    html += '<div style="color:#999;">还没有回复，来说两句吧～</div>';
                } else {
                    post.replies.forEach(r => {
                        const rt = new Date(r.createdAt).toLocaleString('zh-CN');
                        html += `
                            <div class="reply-item">
                                <div class="reply-meta">${r.name}  ·  ${rt}</div>
                                <div class="reply-content">${r.content}</div>
                            </div>
                        `;
                    });
                }
                html += `
                    </div>
                    <div class="reply-form" id="replyForm">
                        <textarea id="replyContent" rows="3" placeholder="写下你的回复..."></textarea>
                        <button id="replyBtn" class="btn-primary">提交回复</button>
                    </div>
                `;
                document.getElementById('postContainer').innerHTML = html;

                // 绑定回复事件
                document.getElementById('replyBtn').addEventListener('click', async function() {
                    const content = document.getElementById('replyContent').value.trim();
                    if (!content) {
                        alert('请输入回复内容');
                        return;
                    }
                    const formData = new FormData();
                    formData.append('postId', postId);
                    formData.append('content', content);
                    try {
                        const res = await fetch('/api/reply', {
                            method: 'POST',
                            credentials: 'include',
                            body: formData
                        });
                        const result = await res.json();
                        if (result.success) {
                            alert('回复成功！');
                            loadPost(); // 刷新页面
                        } else {
                            alert(result.error || '回复失败');
                        }
                    } catch (err) {
                        alert('网络错误，请重试');
                    }
                });
            } catch (err) {
                document.getElementById('postContainer').innerHTML = '<div style="color:red;">加载失败，请刷新</div>';
            }
        }

        loadPost();
    </script>
</body>
</html>
