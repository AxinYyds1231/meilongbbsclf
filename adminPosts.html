<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>帖子管理</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .post-item { background: #f9f9f9; padding: 8px; border-radius: 4px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
        .delete-btn { background: #d9534f; color: white; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; }
        .delete-btn:hover { background: #c9302c; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 700px;">
        <h1>📝 帖子管理</h1>
        <div id="postList">加载中...</div>
        <a href="/adminDashboard.html">返回管理后台</a>
    </div>
    <script>
        async function loadPosts() {
            try {
                const res = await fetch('/api/posts');
                const data = await res.json();
                const container = document.getElementById('postList');
                let html = '';
                data.posts.forEach(p => {
                    html += `
                        <div class="post-item">
                            <div><a href="/post.html?id=${p.id}">${p.title}</a> - ${p.authorName}</div>
                            <button class="delete-btn" data-id="${p.id}">删除</button>
                        </div>
                    `;
                });
                container.innerHTML = html;

                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const id = this.dataset.id;
                        const reason = prompt('请输入删除原因：');
                        if (reason && reason.trim()) {
                            const fd = new FormData();
                            fd.append('postId', id);
                            fd.append('reason', reason);
                            fetch('/api/adminDeletePostWithReason', { method: 'POST', credentials: 'include', body: fd })
                                .then(r => r.json())
                                .then(res => {
                                    if (res.success) { alert('已删除'); loadPosts(); }
                                    else alert(res.error);
                                });
                        }
                    });
                });
            } catch (err) {
                document.getElementById('postList').innerHTML = '加载失败';
            }
        }
        loadPosts();
    </script>
</body>
</html>
